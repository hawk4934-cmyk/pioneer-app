<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="봉사기록">
<meta name="theme-color" content="#ffffff">
<title>파이오니아 봉사기록</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --primary:#1a1a1a;--bg:#fff;--bg2:#f5f5f5;--bg3:#efefef;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --text1:#1a1a1a;--text2:#666;--text3:#999;
  --green:#1D9E75;--green-bg:#e1f5ee;--green-text:#0F6E56;
  --red:#D85A30;--red-bg:#FAECE7;--red-text:#993C1D;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --purple:#534AB7;--purple-bg:#EEEDFE;
  --pink:#993556;--pink-bg:#FBEAF0;
  --nav-h:60px;--safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --primary:#f0f0f0;--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.22);
  --text1:#f0f0f0;--text2:#aaa;--text3:#666;
  --green:#30d158;--green-bg:#0a3a24;--green-text:#30d158;
  --red:#ff6b47;--red-bg:#3a1a0a;--red-text:#ff6b47;
  --blue:#5e9fe0;--blue-bg:#0a2040;
  --purple:#9b94e8;--purple-bg:#1a1840;
  --pink:#d96fa0;--pink-bg:#3a1030;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text1);font-family:-apple-system,'Malgun Gothic',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.header{padding:14px 16px 10px;border-bottom:.5px solid var(--border);flex-shrink:0}
.header h1{font-size:17px;font-weight:600}
.header p{font-size:12px;color:var(--text2);margin-top:2px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 10px)}
.nav{height:var(--nav-h);border-top:.5px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safe-b);background:var(--bg)}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;border:none;background:none;cursor:pointer;color:var(--text3);padding:0}
.nav button.active{color:var(--primary)}
.nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.page{display:none;padding:14px 16px}
.page.active{display:block}
.detail-page{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;z-index:10;padding:14px 16px calc(20px + var(--safe-b))}
.detail-page.active{display:block}
.sec-title{font-size:13px;font-weight:600;color:var(--text1);margin:16px 0 10px;display:flex;justify-content:space-between;align-items:center}
.sec-title:first-child{margin-top:0}
.metric-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.metric{background:var(--bg2);border-radius:12px;padding:12px}
.metric .label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric .val{font-size:22px;font-weight:600;line-height:1}
.metric .sub{font-size:11px;color:var(--text2);margin-top:4px}
.metric.full{grid-column:1/-1}
.prog{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;background:var(--green);border-radius:4px;transition:width .4s}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px}
.form-row{margin-bottom:13px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:13px 14px;font-size:17px;border:.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;appearance:none;-webkit-appearance:none}
.form-row textarea{resize:none;height:90px;line-height:1.6}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn-primary{width:100%;padding:14px;background:var(--primary);color:var(--bg);border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
.btn-sm{padding:6px 12px;font-size:12px;border:.5px solid var(--border2);border-radius:8px;background:none;cursor:pointer;color:var(--text1);font-family:inherit;display:flex;align-items:center;gap:4px}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--text3);padding:6px;display:flex;align-items:center}
.btn-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:500}
.b-ldc{background:var(--blue-bg);color:var(--blue)}
.b-edu{background:var(--green-bg);color:var(--green-text)}
.b-study{background:var(--purple-bg);color:var(--purple)}
.b-visit{background:var(--red-bg);color:var(--red-text)}
.b-research{background:var(--purple-bg);color:var(--purple)}
.b-m{background:var(--blue-bg);color:var(--blue)}
.b-f{background:var(--pink-bg);color:var(--pink)}
.empty{text-align:center;padding:36px 0;color:var(--text3);font-size:14px}
.person-card{background:var(--bg);border:.5px solid var(--border);border-radius:14px;padding:13px;margin-bottom:9px;cursor:pointer;display:flex;align-items:center;gap:12px}
.person-card:active{background:var(--bg2)}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
.avatar.m{background:var(--blue-bg);color:var(--blue)}
.avatar.f{background:var(--pink-bg);color:var(--pink)}
.avatar.n{background:var(--bg3);color:var(--text2)}
.search-bar{width:100%;padding:10px 12px;font-size:14px;border:.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;margin-bottom:10px}
.filter-row{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.filter-btn{padding:5px 12px;font-size:12px;border:.5px solid var(--border2);border-radius:20px;background:none;cursor:pointer;color:var(--text2);white-space:nowrap;font-family:inherit;flex-shrink:0}
.filter-btn.on{background:var(--primary);color:var(--bg);border-color:var(--primary)}
.sort-sel{font-size:12px;padding:5px 10px;border:.5px solid var(--border2);border-radius:8px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none}
.back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--text1);font-size:15px;font-family:inherit;padding:0}
.back-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.hist-item{padding:12px 0;border-bottom:.5px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.yearly-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:.5px solid var(--border)}
.yearly-row:last-child{border-bottom:none}
.detail-row{display:flex;gap:8px;padding:7px 0;border-bottom:.5px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-row .dl{color:var(--text2);min-width:56px;flex-shrink:0}
.green{color:var(--green)}
.red{color:var(--red)}

/* ── 달력 ── */
.cal-wrap{background:var(--bg);border:.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:.5px solid var(--border)}
.cal-header span{font-size:15px;font-weight:600}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--text1);padding:4px 10px;font-size:18px;border-radius:8px}
.cal-nav:active{background:var(--bg2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-dow{text-align:center;font-size:11px;color:var(--text2);padding:8px 0}
.cal-day{text-align:center;padding:7px 2px;font-size:13px;cursor:pointer;border-radius:8px;margin:2px;position:relative;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.cal-day:active{background:var(--bg2)}
.cal-day.other{color:var(--text3)}
.cal-day.today{font-weight:700;color:var(--green)}
.cal-day.selected{background:var(--primary)!important;color:var(--bg)!important;border-radius:50%;width:32px;height:32px;margin:3px auto;padding:0}
.cal-day.has-rec::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);display:block}
.cal-day.selected.has-rec::after{background:var(--bg)}
.cal-day.sun{color:var(--red)}
.cal-day.sat{color:var(--blue)}
.cal-day.today.sun,.cal-day.today.sat{color:inherit}

/* ── 시간 입력 ── */
.time-input{display:flex;align-items:center;gap:6px}
.time-input select,.time-input input{flex:1;padding:13px 8px;font-size:18px;font-weight:600;border:.5px solid var(--border2);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;text-align:center}
.time-sep{font-size:16px;font-weight:600;color:var(--text2);flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <h1>파이오니아 봉사기록</h1>
        <p id="header-period"></p>
      </div>
      <button onclick="forceRefresh()" style="background:none;border:.5px solid var(--border2);border-radius:20px;padding:6px 10px;cursor:pointer;color:var(--text2);font-family:inherit;display:flex;align-items:center;gap:4px;font-size:11px;">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        새로고침
      </button>
    </div>
  </div>
  <div class="content" id="main-content">

    <!-- 홈 -->
    <div id="page-dashboard" class="page active">
      <div class="sec-title">당월 현황</div>
      <div class="metric-grid">
        <div class="metric full">
          <div class="label">당월 총 봉사시간 (목표 50시간)</div>
          <div class="val" id="d-total">0시간 0분</div>
          <div class="prog"><div class="prog-fill" id="d-bar" style="width:0%"></div></div>
          <div class="sub" id="d-remain"></div>
        </div>
        <div class="metric"><div class="label">봉사시간</div><div class="val" id="d-service">0h 0m</div></div>
        <div class="metric"><div class="label">LDC 시간</div><div class="val" id="d-ldc">0h 0m</div></div>
        <div class="metric"><div class="label">P학교</div><div class="val" id="d-edu">0h 0m</div></div>
        <div class="metric"><div class="label">총 연구 수</div><div class="val" id="d-study">0</div><div class="sub">건</div></div>
        <div class="metric full">
          <div class="label">이달 부족/잉여</div>
          <div class="val" id="d-diff">-</div>
        </div>
      </div>
      <button onclick="shareMonthReport()" style="display:flex;align-items:center;gap:8px;width:100%;padding:12px 14px;background:var(--green-bg, #e1f5ee);color:var(--green-text, #0F6E56);border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:14px;justify-content:center;">
        <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        봉사보고
      </button>
      <div class="sec-title">봉사연도 누계 (9월~8월)</div>
      <div class="metric-grid">
        <div class="metric"><div class="label">연누계 총시간</div><div class="val" id="d-yearly">0h</div></div>
        <div class="metric"><div class="label">연 부족/잉여</div><div class="val" id="d-yearly-diff">-</div></div>
      </div>
      <div class="sec-title">관심자 현황</div>
      <div class="metric-grid">
        <div class="metric"><div class="label">전체 관심자</div><div class="val" id="d-p-total">0</div><div class="sub">명</div></div>
        <div class="metric"><div class="label">연구 중</div><div class="val" id="d-p-study">0</div><div class="sub">명</div></div>
      </div>
    </div>

    <!-- 기록 추가 -->
    <div id="page-add" class="page">
      <div class="sec-title" id="add-page-title">봉사 기록 추가</div>

      <!-- 달력 -->
      <div class="cal-wrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="calMove(-1)">‹</button>
          <span id="cal-title"></span>
          <button class="cal-nav" onclick="calMove(1)">›</button>
        </div>
        <div class="cal-grid" id="cal-dow-row"></div>
        <div class="cal-grid" id="cal-body"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <span style="font-size:13px;color:var(--text2);">선택 날짜:</span>
        <span id="selected-date-label" style="font-size:14px;font-weight:600;"></span>
      </div>

      <div class="card">
        <!-- 봉사시간 -->
        <div class="form-row">
          <label>봉사시간</label>
          <div class="time-input">
            <input type="number" id="f-service-h" min="0" max="23" inputmode="numeric" placeholder="0">
            <span class="time-sep">시간</span>
            <input type="number" id="f-service-m" min="0" max="59" inputmode="numeric" placeholder="0">
            <span class="time-sep">분</span>
          </div>
        </div>
        <!-- LDC -->
        <div class="form-row">
          <label>LDC 시간</label>
          <div class="time-input">
            <input type="number" id="f-ldc-h" min="0" max="23" inputmode="numeric" placeholder="0">
            <span class="time-sep">시간</span>
            <input type="number" id="f-ldc-m" min="0" max="59" inputmode="numeric" placeholder="0">
            <span class="time-sep">분</span>
          </div>
        </div>
        <div class="form-row"><label>LDC 메모</label><input type="text" id="f-ldc-memo" placeholder="LDC 내용 메모"></div>
        <!-- 학교 -->
        <div class="form-row">
          <label>P학교 시간</label>
          <div class="time-input">
            <input type="number" id="f-edu-h" min="0" max="23" inputmode="numeric" placeholder="0">
            <span class="time-sep">시간</span>
            <input type="number" id="f-edu-m" min="0" max="59" inputmode="numeric" placeholder="0">
            <span class="time-sep">분</span>
          </div>
        </div>
        <div class="form-row"><label>P학교 메모</label><input type="text" id="f-edu-memo" placeholder="P학교 메모"></div>
        <!-- 연구 -->
        <div class="form-row">
          <label>연구 수 (건)</label>
          <input type="number" id="f-study" min="0" step="1" placeholder="0" inputmode="numeric">
        </div>
        <div class="form-row"><label>메모</label><textarea id="f-memo" placeholder="기타 메모..."></textarea></div>
        <button class="btn-primary" id="add-record-btn" onclick="addRecord()">저장</button>
        <button class="btn-sm" id="cancel-edit-btn" onclick="cancelEditRecord()" style="display:none;width:100%;justify-content:center;margin-top:8px;">취소</button>
      </div>
    </div>

    <!-- 기록 내역 -->
    <div id="page-records" class="page">
      <div class="sec-title">
        <span>월별 기록</span>
        <select id="month-select" class="sort-sel" onchange="renderRecords()"></select>
      </div>
      <!-- 월 합계 요약 -->
      <div id="month-summary" style="display:none;background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:12px;">
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px;">월 합계</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;">
          <div><span style="font-size:11px;color:var(--text2);">총시간</span><div id="ms-total" style="font-size:16px;font-weight:700;"></div></div>
          <div><span style="font-size:11px;color:var(--text2);">봉사</span><div id="ms-service" style="font-size:16px;font-weight:700;"></div></div>
          <div><span style="font-size:11px;color:var(--text2);">LDC</span><div id="ms-ldc" style="font-size:15px;font-weight:600;"></div></div>
          <div><span style="font-size:11px;color:var(--text2);">P학교</span><div id="ms-edu" style="font-size:15px;font-weight:600;"></div></div>
          <div><span style="font-size:11px;color:var(--text2);">연구</span><div id="ms-study" style="font-size:15px;font-weight:600;"></div></div>
          <div><span style="font-size:11px;color:var(--text2);">목표대비</span><div id="ms-diff" style="font-size:15px;font-weight:600;"></div></div>
        </div>
      </div>
      <div id="records-list"></div>
    </div>

    <!-- 연누계 -->
    <div id="page-yearly" class="page">
      <div class="sec-title">봉사연도 월별 현황</div>
      <div id="yearly-list"></div>
    </div>

    <!-- 관심자 목록 -->
    <div id="page-people" class="page">
      <div class="sec-title">
        <span>관심자 관리</span>
        <button class="btn-sm" onclick="showPersonForm(null)">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>추가
        </button>
      </div>
      <input type="text" class="search-bar" placeholder="이름, 주소, 구역 검색..." oninput="renderPeople()" id="people-search">
      <div class="filter-row">
        <button class="filter-btn on" data-filter="all" onclick="setFilter(this)">전체</button>
        <button class="filter-btn" data-filter="재방" onclick="setFilter(this)">재방</button>
        <button class="filter-btn" data-filter="연구" onclick="setFilter(this)">연구</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span style="font-size:12px;color:var(--text2);">정렬</span>
        <select class="sort-sel" id="people-sort" onchange="renderPeople()">
          <option value="name">이름순</option>
          <option value="dong">구역(동)순</option>
          <option value="recent">최근 방문순</option>
          <option value="count">방문 횟수순</option>
        </select>
      </div>
      <div id="people-list"></div>
    </div>

  </div>

  <nav class="nav">
    <button class="active" onclick="showPage('dashboard')" id="nav-dashboard">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈
    </button>
    <button onclick="showPage('add')" id="nav-add">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>기록
    </button>
    <button onclick="showPage('records')" id="nav-records">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>내역
    </button>
    <button onclick="showPage('yearly')" id="nav-yearly">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>연누계
    </button>

<script>
// ── 상수 ──
const MONTHLY_MIN = 50*60; // 3000분
const YEARLY_MIN  = 600*60;

// ── 유틸 ──
function pad(n){return String(n).padStart(2,'0')}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function getMonthKey(ds){return ds.slice(0,7)}
function getServiceYear(d){d=d||new Date();return(d.getMonth()+1)>=9?d.getFullYear():d.getFullYear()-1}
function getServiceMonths(sy){const ms=[];for(let i=0;i<12;i++){const m=(8+i)%12+1;const y=m>=9?sy:sy+1;ms.push({year:y,month:m})}return ms}
function fmtTime(totalMin){
  const h=Math.floor(totalMin/60),m=totalMin%60;
  return m?h+'시간 '+m+'분':h+'시간'
}
function fmtShort(totalMin){
  const h=Math.floor(totalMin/60),m=totalMin%60;
  return m?h+'h '+m+'m':h+'h'
}

// ── 스토리지 ──
function loadRec(){try{return JSON.parse(localStorage.getItem('p_rec')||'[]')}catch(e){return[]}}
function saveRec(d){localStorage.setItem('p_rec',JSON.stringify(d))}
function loadPeople(){try{return JSON.parse(localStorage.getItem('p_ppl')||'[]')}catch(e){return[]}}
function savePeople(d){localStorage.setItem('p_ppl',JSON.stringify(d))}

// 분 집계 (하위호환: 기존 소수점 시간도 처리)
function toMin(h,m){return (h||0)*60+(m||0)}
function recTotalMin(r){
  // 새 형식: serviceMin 등 / 구 형식: service(소수) 등
  if(r.serviceMin!==undefined){
    return(r.serviceMin||0)+(r.ldcMin||0)+(r.eduMin||0)
  }
  return Math.round(((r.service||0)+(r.ldc||0)+(r.edu||0))*60)
}
function recServiceMin(r){return r.serviceMin!==undefined?r.serviceMin:Math.round((r.service||0)*60)}
function recLdcMin(r){return r.ldcMin!==undefined?r.ldcMin:Math.round((r.ldc||0)*60)}
function recEduMin(r){return r.eduMin!==undefined?r.eduMin:Math.round((r.edu||0)*60)}

function sumMonth(recs,ym){
  return recs.filter(r=>getMonthKey(r.date)===ym).reduce((a,r)=>{
    a.service+=recServiceMin(r);a.ldc+=recLdcMin(r);
    a.edu+=recEduMin(r);a.study+=(r.study||0);
    a.total+=recTotalMin(r);return a
  },{service:0,ldc:0,edu:0,study:0,total:0})
}

// ── 시간 입력 초기화 ──
function resetTimeInputs(){
  ['f-service-h','f-service-m','f-ldc-h','f-ldc-m','f-edu-h','f-edu-m'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-study').value='';
  ['f-ldc-memo','f-edu-memo','f-memo'].forEach(id=>document.getElementById(id).value='');
}

// ── 달력 ──
let calYear,calMonth,selectedDate;
function initCal(){
  const now=new Date();
  calYear=now.getFullYear();calMonth=now.getMonth();
  selectedDate=todayStr();
  renderCal();
}
function calMove(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++}
  if(calMonth<0){calMonth=11;calYear--}
  renderCal();
}
function selectDay(ds){
  selectedDate=ds;
  document.getElementById('selected-date-label').textContent=ds;
  renderCal();
}
function renderCal(){
  const recs=loadRec();
  const recDates=new Set(recs.map(r=>r.date));
  const now=new Date();
  const title=calYear+'년 '+(calMonth+1)+'월';
  document.getElementById('cal-title').textContent=title;
  // 요일 헤더
  const dows=['일','월','화','수','목','금','토'];
  const dowRow=document.getElementById('cal-dow-row');
  dowRow.innerHTML=dows.map((d,i)=>`<div class="cal-dow" style="${i===0?'color:var(--red)':i===6?'color:var(--blue)':''}">${d}</div>`).join('');
  // 날짜 계산
  const first=new Date(calYear,calMonth,1);
  const last=new Date(calYear,calMonth+1,0);
  const startDow=first.getDay();
  const todayS=todayStr();
  let html='';
  // 이전달 채우기
  for(let i=0;i<startDow;i++){
    const d=new Date(calYear,calMonth,-(startDow-1-i));
    const ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    const dow=d.getDay();
    html+=`<div class="cal-day other${recDates.has(ds)?' has-rec':''}${ds===selectedDate?' selected':''}" onclick="selectDay('${ds}')">${d.getDate()}</div>`;
  }
  for(let day=1;day<=last.getDate();day++){
    const ds=calYear+'-'+pad(calMonth+1)+'-'+pad(day);
    const dow=new Date(calYear,calMonth,day).getDay();
    let cls='cal-day';
    if(dow===0)cls+=' sun';
    if(dow===6)cls+=' sat';
    if(ds===todayS)cls+=' today';
    if(ds===selectedDate)cls+=' selected';
    if(recDates.has(ds))cls+=' has-rec';
    html+=`<div class="${cls}" onclick="selectDay('${ds}')">${day}</div>`;
  }
  // 다음달 채우기
  const remain=(7-((startDow+last.getDate())%7))%7;
  for(let i=1;i<=remain;i++){
    const ds=calYear+'-'+pad(calMonth+1+1>12?1:calMonth+2)+'-'+pad(i);
    html+=`<div class="cal-day other${recDates.has(ds)?' has-rec':''}" onclick="selectDay('${ds}')">${i}</div>`;
  }
  document.getElementById('cal-body').innerHTML=html;
  document.getElementById('selected-date-label').textContent=selectedDate;
}

// ── 페이지 이동 ──
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  document.getElementById('main-content').scrollTop=0;
  if(id==='dashboard')renderDashboard();
  if(id==='add')renderCal();
  if(id==='records')renderRecords();
  if(id==='yearly')renderYearly();
  if(id==='people')renderPeople();
}
function hideDetails(){document.querySelectorAll('.detail-page').forEach(p=>p.classList.remove('active'))}

// ── 대시보드 ──
function shareMonthReport(){
  const now=new Date();
  // 전월 기준 (익월초에 전달 보고)
  const prev=new Date(now.getFullYear(),now.getMonth()-1,1);
  const key=prev.getFullYear()+'-'+pad(prev.getMonth()+1);
  const ms=sumMonth(loadRec(),key);
  const y=key.split('-')[0],m=parseInt(key.split('-')[1]);
  const people=loadPeople();
  const rc=people.filter(p=>p.type==='연구').length;
  const consideration=ms.ldc+ms.edu;
  var R='\n';
  var lines=[];
  lines.push('[봉사보고] '+y+'년 '+m+'월');
  lines.push('총 봉사시간: '+fmtTime(ms.service));
  if(consideration>0){
    lines.push('총 고려시간: '+fmtTime(consideration));
    if(ms.ldc)lines.push('  LDC: '+fmtTime(ms.ldc));
    if(ms.edu)lines.push('  P학교: '+fmtTime(ms.edu));
  }
  if(rc)lines.push('연구: '+rc+'건');
  var text=lines.join(R);
  if(navigator.share){navigator.share({text:text})}
  else if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert('클립보드에 복사됐어요!\n카카오톡이나 문자에 붙여넣기 하세요.'))}
}

function renderDashboard(){
  const recs=loadRec(),people=loadPeople(),now=new Date();
  const curKey=now.getFullYear()+'-'+pad(now.getMonth()+1);
  const ms=sumMonth(recs,curKey);
  const pct=Math.min(Math.round(ms.total/MONTHLY_MIN*100),100);
  const diff=ms.total-MONTHLY_MIN;
  document.getElementById('d-total').textContent=fmtTime(ms.total);
  document.getElementById('d-bar').style.width=pct+'%';
  document.getElementById('d-service').textContent=fmtShort(ms.service);
  document.getElementById('d-ldc').textContent=fmtShort(ms.ldc);
  document.getElementById('d-edu').textContent=fmtShort(ms.edu);
  document.getElementById('d-study').textContent=ms.study;
  const remMin=Math.max(0,MONTHLY_MIN-ms.total);
  document.getElementById('d-remain').textContent=pct+'% 달성 · 남은 목표 '+fmtTime(remMin);
  const diffEl=document.getElementById('d-diff');
  if(diff>=0){diffEl.textContent='+'+fmtTime(diff)+' 잉여';diffEl.className='val green'}
  else{diffEl.textContent=fmtTime(-diff)+' 부족';diffEl.className='val red'}
  const sy=getServiceYear(now),sms=getServiceMonths(sy);
  let yt=0;sms.forEach(sm=>{yt+=sumMonth(recs,sm.year+'-'+pad(sm.month)).total});
  const elapsed=sms.filter(sm=>new Date(sm.year,sm.month-1,1)<=now).length;
  const ydiff=yt-(elapsed*MONTHLY_MIN);
  document.getElementById('d-yearly').textContent=fmtShort(yt);
  const ydEl=document.getElementById('d-yearly-diff');
  if(ydiff>=0){ydEl.textContent='+'+fmtShort(ydiff)+' 잉여';ydEl.className='val green'}
  else{ydEl.textContent=fmtShort(-ydiff)+' 부족';ydEl.className='val red'}
  document.getElementById('d-p-total').textContent=people.length;
  document.getElementById('d-p-study').textContent=people.filter(p=>p.type==='연구').length;
  const sy2=getServiceYear(now);
  document.getElementById('header-period').textContent=sy2+'~'+(sy2+1)+' 봉사연도';
}

// ── 기록 저장/수정 ──
let editingRecordIdx=null;

function addRecord(){
  if(!selectedDate){alert('날짜를 선택해주세요');return}
  const serviceMin=toMin(+document.getElementById('f-service-h').value||0,+document.getElementById('f-service-m').value||0);
  const ldcMin=toMin(+document.getElementById('f-ldc-h').value||0,+document.getElementById('f-ldc-m').value||0);
  const eduMin=toMin(+document.getElementById('f-edu-h').value||0,+document.getElementById('f-edu-m').value||0);
  if(serviceMin+ldcMin+eduMin===0&&!document.getElementById('f-study').value){
    alert('최소 하나의 시간 또는 연구 수를 입력해주세요');return
  }
  const r={
    date:selectedDate,
    serviceMin,ldcMin,eduMin,
    ldcMemo:document.getElementById('f-ldc-memo').value,
    eduMemo:document.getElementById('f-edu-memo').value,
    study:parseInt(document.getElementById('f-study').value)||0,
    memo:document.getElementById('f-memo').value
  };
  const recs=loadRec();
  if(editingRecordIdx!==null){
    recs[editingRecordIdx]=r;
    saveRec(recs);
    cancelEditRecord();
    renderCal();
    alert('수정되었습니다!');
    showPage('records');
  } else {
    recs.push(r);saveRec(recs);
    resetTimeInputs();
    renderCal();
    alert('저장되었습니다!');
    showPage('dashboard');
  }
}

function editRecord(idx){
  const recs=loadRec();
  const r=recs[idx];
  if(!r)return;
  editingRecordIdx=idx;
  selectedDate=r.date;
  document.getElementById('f-service-h').value=Math.floor((r.serviceMin||0)/60)||'';
  document.getElementById('f-service-m').value=(r.serviceMin||0)%60||'';
  document.getElementById('f-ldc-h').value=Math.floor((r.ldcMin||0)/60)||'';
  document.getElementById('f-ldc-m').value=(r.ldcMin||0)%60||'';
  document.getElementById('f-edu-h').value=Math.floor((r.eduMin||0)/60)||'';
  document.getElementById('f-edu-m').value=(r.eduMin||0)%60||'';
  document.getElementById('f-ldc-memo').value=r.ldcMemo||'';
  document.getElementById('f-edu-memo').value=r.eduMemo||'';
  document.getElementById('f-study').value=r.study||'';
  document.getElementById('f-memo').value=r.memo||'';
  document.getElementById('add-record-btn').textContent='수정 완료';
  document.getElementById('cancel-edit-btn').style.display='flex';
  document.getElementById('add-page-title').textContent='봉사 기록 수정';
  showPage('add');
}

function cancelEditRecord(){
  editingRecordIdx=null;
  resetTimeInputs();
  document.getElementById('add-record-btn').textContent='저장';
  document.getElementById('cancel-edit-btn').style.display='none';
  document.getElementById('add-page-title').textContent='봉사 기록 추가';
}


// ── 월별 기록 ──
function buildMonthSelect(){
  const sel=document.getElementById('month-select');
  const curVal=sel.value;
  sel.innerHTML='';
  const now=new Date();
  const curKey=now.getFullYear()+'-'+pad(now.getMonth()+1);
  // 실제 기록된 월 + 현재 월 수집
  const recs=loadRec();
  const monthSet=new Set(recs.map(r=>getMonthKey(r.date)));
  monthSet.add(curKey);
  // 내림차순 정렬 (최신월 먼저)
  const months=[...monthSet].sort().reverse();
  months.forEach(key=>{
    const parts=key.split('-');
    const y=parts[0],m=parts[1];
    const o=document.createElement('option');
    o.value=key;
    o.textContent=y+'년 '+parseInt(m)+'월';
    if(key===(curVal||curKey))o.selected=true;
    sel.appendChild(o);
  });
}
function renderRecords(){
  buildMonthSelect();
  const recs=loadRec(),key=document.getElementById('month-select').value;
  const filtered=recs.filter(r=>getMonthKey(r.date)===key).sort((a,b)=>a.date.localeCompare(b.date));
  const list=document.getElementById('records-list');
  const summary=document.getElementById('month-summary');

  if(!filtered.length){
    list.innerHTML='<div class="empty">이 달 기록이 없습니다</div>';
    summary.style.display='none';return
  }

  // 월 합계 계산
  const ms=sumMonth(recs,key);
  summary.style.display='block';
  document.getElementById('ms-total').textContent=fmtTime(ms.total);
  document.getElementById('ms-service').textContent=fmtTime(ms.service);
  document.getElementById('ms-ldc').textContent=fmtTime(ms.ldc);
  document.getElementById('ms-edu').textContent=fmtTime(ms.edu);
  document.getElementById('ms-study').textContent=ms.study+'건';
  const diff=ms.total-MONTHLY_MIN;
  const diffEl=document.getElementById('ms-diff');
  if(diff>=0){diffEl.textContent='+'+fmtTime(diff);diffEl.style.color='var(--green)'}
  else{diffEl.textContent='-'+fmtTime(-diff);diffEl.style.color='var(--red)'}

  // 날짜별 그룹핑 (같은 날 여러 건도 표시)
  const days={};
  filtered.forEach(r=>{if(!days[r.date])days[r.date]=[];days[r.date].push(r)});

  const DOW=['일','월','화','수','목','금','토'];
  list.innerHTML=Object.keys(days).sort().reverse().map(date=>{
    const dayRecs=days[date];
    const d=new Date(date+'T00:00:00');
    const dow=DOW[d.getDay()];
    const dowColor=d.getDay()===0?'var(--red)':d.getDay()===6?'var(--blue)':'var(--text2)';
    const dayTotal=dayRecs.reduce((a,r)=>a+recTotalMin(r),0);
    const dayStudy=dayRecs.reduce((a,r)=>a+(r.study||0),0);

    const recRows=dayRecs.map(r=>{
      const idx=recs.indexOf(r);
      const sMin=recServiceMin(r),lMin=recLdcMin(r),eMin=recEduMin(r);
      return`<div style="padding:10px 0;border-top:.5px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div style="flex:1;">
            <!-- 봉사시간 -->
            ${sMin?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span style="font-size:11px;color:var(--text2);min-width:36px;">봉사</span>
              <span style="font-size:14px;font-weight:600;">${fmtTime(sMin)}</span>
            </div>`:''}
            <!-- LDC -->
            ${lMin?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span class="badge b-ldc" style="font-size:10px;min-width:36px;text-align:center;">LDC</span>
              <span style="font-size:14px;font-weight:600;">${fmtTime(lMin)}</span>
              ${r.ldcMemo?`<span style="font-size:12px;color:var(--text2);">${r.ldcMemo}</span>`:''}
            </div>`:''}
            <!-- 학교 -->
            ${eMin?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span class="badge b-edu" style="font-size:10px;min-width:36px;text-align:center;">P학교</span>
              <span style="font-size:14px;font-weight:600;">${fmtTime(eMin)}</span>
              ${r.eduMemo?`<span style="font-size:12px;color:var(--text2);">${r.eduMemo}</span>`:''}
            </div>`:''}
            <!-- 연구 -->
            ${r.study?`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
              <span class="badge b-study" style="font-size:10px;min-width:36px;text-align:center;">연구</span>
              <span style="font-size:14px;font-weight:600;">${r.study}건</span>
            </div>`:''}
            <!-- 메모 -->
            ${r.memo?`<div style="font-size:12px;color:var(--text3);margin-top:4px;font-style:italic;line-height:1.4;">${r.memo}</div>`:''}
          </div>
          <button class="btn-icon" onclick="editRecord(${idx})" style="margin-left:8px;flex-shrink:0;">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon" onclick="deleteRecord(${idx})" style="flex-shrink:0;">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>`
    }).join('');

    return`<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px;">
      <!-- 날짜 헤더 -->
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--bg2);">
        <div style="display:flex;align-items:baseline;gap:8px;">
          <span style="font-size:16px;font-weight:700;">${date.slice(5).replace('-','/')}</span>
          <span style="font-size:13px;color:${dowColor};font-weight:600;">(${dow})</span>
        </div>
        <div style="text-align:right;">
          <span style="font-size:15px;font-weight:700;color:var(--green);">${fmtTime(dayTotal)}</span>
          ${dayStudy?`<span style="font-size:12px;color:var(--text2);margin-left:6px;">연구 ${dayStudy}건</span>`:''}
        </div>
      </div>
      <!-- 세부 기록 -->
      <div style="padding:0 14px;">
        ${recRows}
      </div>
    </div>`
  }).join('');
}
function deleteRecord(idx){if(!confirm('이 기록을 삭제할까요?'))return;const r=loadRec();r.splice(idx,1);saveRec(r);renderRecords();renderCal()}

// ── 연누계 ──
function renderYearly(){
  const recs=loadRec(),now=new Date(),sy=getServiceYear(now),sms=getServiceMonths(sy);
  let yt=0;
  const rows=sms.map(sm=>{
    const key=sm.year+'-'+pad(sm.month),s=sumMonth(recs,key);
    yt+=s.total;
    const isFuture=new Date(sm.year,sm.month-1,1)>now;
    const pct=Math.min(Math.round(s.total/MONTHLY_MIN*100),100);
    return`<div class="yearly-row">
      <span style="font-size:13px;min-width:30px;">${sm.month}월</span>
      <div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;">
        <div style="height:100%;background:var(--green);border-radius:3px;width:${isFuture?0:pct}%"></div>
      </div>
      <span style="font-size:13px;font-weight:600;min-width:64px;text-align:right;">${isFuture?'-':fmtTime(s.total)}</span>
    </div>`
  }).join('');
  document.getElementById('yearly-list').innerHTML=`
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--text2);">${sy}~${sy+1} 연도 누계</span>
        <span style="font-size:17px;font-weight:600;">${fmtTime(yt)} / 600시간</span>
      </div>
      <div class="prog" style="margin-top:8px;"><div class="prog-fill" style="width:${Math.min(Math.round(yt/YEARLY_MIN*100),100)}%"></div></div>
    </div>
    <div class="card">${rows}</div>`
}

// ── 관심자 ──
let peopleFilter='all';
function setFilter(btn){peopleFilter=btn.dataset.filter;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderPeople()}
function renderPeople(){
  const people=loadPeople();
  const q=(document.getElementById('people-search').value||'').toLowerCase();
  const sort=document.getElementById('people-sort').value;
  let filtered=people.filter(p=>{
    if(peopleFilter!=='all'&&p.type!==peopleFilter)return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.address||'').toLowerCase().includes(q)&&!(p.dong||'').includes(q))return false;
    return true;
  });
  filtered.sort((a,b)=>{
    if(sort==='name')return a.name.localeCompare(b.name);
    if(sort==='dong')return(a.dong||'').localeCompare(b.dong||'');
    if(sort==='recent'){const la=(a.visits||[]).length?a.visits[a.visits.length-1].date:'0';const lb=(b.visits||[]).length?b.visits[b.visits.length-1].date:'0';return lb.localeCompare(la)}
    if(sort==='count')return(b.visits||[]).length-(a.visits||[]).length;
    return 0;
  });
  const list=document.getElementById('people-list');
  if(!filtered.length){list.innerHTML='<div class="empty">등록된 관심자가 없습니다</div>';return}
  list.innerHTML=filtered.map(p=>{
    const gc=p.gender==='여'?'f':p.gender==='남'?'m':'n';
    const vcount=(p.visits||[]).length;
    const lastVisit=vcount?p.visits[vcount-1].date:'없음';
    const typeBadge=p.type==='연구'?'<span class="badge b-research">연구</span>':'<span class="badge b-visit">재방</span>';
    const gBadge=p.gender?`<span class="badge ${gc==='f'?'b-f':'b-m'}">${p.gender}</span>`:'';
    return`<div class="person-card" onclick="showPersonDetail('${p.id}')">
      <div class="avatar ${gc}">${p.name.slice(-2)}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap;">
          <span style="font-size:15px;font-weight:600;">${p.name}</span>${gBadge}${p.age?`<span style="font-size:12px;color:var(--text2);">${p.age}세</span>`:''}${typeBadge}
        </div>
        <div style="font-size:12px;color:var(--text2);">${p.dong?p.dong+' · ':''}재방 ${vcount}회 · 최근 ${lastVisit}</div>
      </div>
      <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`
  }).join('');
}

let currentPersonId=null,editPersonId=null;
function showPersonDetail(id){
  currentPersonId=id;
  const people=loadPeople(),p=people.find(x=>x.id===id);
  if(!p)return;
  hideDetails();
  document.getElementById('page-person-detail').classList.add('active');
  const gc=p.gender==='여'?'f':p.gender==='남'?'m':'n';
  const rows=[
    p.gender?['성별',p.gender]:[],p.age?['나이',p.age+'세']:[],
    p.type?['방문형식',p.type]:[],p.address?['주소',p.address]:[],
    (p.dong||p.region)?['구역',[p.region,p.dong].filter(Boolean).join(' · ')]:[],
    p.memo?['메모',p.memo]:[]
  ].filter(r=>r.length).map(([l,v])=>`<div class="detail-row"><span class="dl">${l}</span><span>${v}</span></div>`).join('');
  document.getElementById('person-detail-content').innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div class="avatar ${gc}" style="width:50px;height:50px;font-size:18px;">${p.name.slice(-2)}</div>
        <div><div style="font-size:18px;font-weight:600;">${p.name}</div><div style="font-size:12px;color:var(--text2);margin-top:2px;">${(p.visits||[]).length}회 방문 기록</div></div>
      </div>${rows}
    </div>`;
  renderVisitHistory(p);
}
function renderVisitHistory(p){
  const visits=(p.visits||[]).slice().reverse();
  const el=document.getElementById('visit-history');
  if(!visits.length){el.innerHTML='<div class="empty">재방 이력이 없습니다</div>';return}
  el.innerHTML=`<div class="card">${visits.map((v,ri)=>{
    const realIdx=p.visits.length-1-ri;
    return`<div class="hist-item">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:13px;font-weight:600;">${v.date}</span>
          <span class="badge ${v.type==='연구'?'b-research':'b-visit'}">${v.type||'재방'}</span>
          <span style="font-size:12px;color:var(--text3);">${realIdx+1}회차</span>
        </div>
        <button class="btn-icon" onclick="deleteVisit('${p.id}',${realIdx})">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>
      ${v.content?`<div style="font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5;">${v.content}</div>`:''}
    </div>`
  }).join('')}</div>`
}
function showPersonForm(id){
  editPersonId=id||null;hideDetails();
  document.getElementById('page-person-form').classList.add('active');
  if(id){
    const p=loadPeople().find(x=>x.id===id);
    document.getElementById('person-form-title').textContent='관심자 수정';
    document.getElementById('pf-name').value=p.name||'';
    document.getElementById('pf-gender').value=p.gender||'';
    document.getElementById('pf-age').value=p.age||'';
    document.getElementById('pf-type').value=p.type||'재방';
    document.getElementById('pf-address').value=p.address||'';
    document.getElementById('pf-dong').value=p.dong||'';
    document.getElementById('pf-region').value=p.region||'';
    document.getElementById('pf-memo').value=p.memo||'';
  }else{
    document.getElementById('person-form-title').textContent='관심자 추가';
    ['pf-name','pf-age','pf-address','pf-dong','pf-region','pf-memo'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('pf-gender').value='';document.getElementById('pf-type').value='재방';
  }
}
function cancelPersonForm(){hideDetails();showPage('people')}
function savePerson(){
  const name=document.getElementById('pf-name').value.trim();
  if(!name){alert('이름을 입력해주세요');return}
  const people=loadPeople();
  const data={name,gender:document.getElementById('pf-gender').value,age:document.getElementById('pf-age').value,type:document.getElementById('pf-type').value,address:document.getElementById('pf-address').value,dong:document.getElementById('pf-dong').value,region:document.getElementById('pf-region').value,memo:document.getElementById('pf-memo').value};
  if(editPersonId){const idx=people.findIndex(p=>p.id===editPersonId);if(idx>-1)people[idx]={...people[idx],...data}}
  else{people.push({id:'p'+Date.now(),visits:[],...data})}
  savePeople(people);hideDetails();showPage('people');
}
function editPerson(){showPersonForm(currentPersonId)}
function deletePerson(){if(!confirm('이 관심자를 삭제할까요?'))return;savePeople(loadPeople().filter(p=>p.id!==currentPersonId));hideDetails();showPage('people')}
function backToPeople(){hideDetails();showPage('people')}
function showVisitForm(){
  hideDetails();document.getElementById('page-visit-form').classList.add('active');
  document.getElementById('vf-date').value=todayStr();
  document.getElementById('vf-content').value='';document.getElementById('vf-type').value='재방';
}
function cancelVisitForm(){hideDetails();showPersonDetail(currentPersonId)}
function saveVisit(){
  const date=document.getElementById('vf-date').value;
  if(!date){alert('날짜를 선택해주세요');return}
  const people=loadPeople(),idx=people.findIndex(p=>p.id===currentPersonId);
  if(idx<0)return;
  if(!people[idx].visits)people[idx].visits=[];
  people[idx].visits.push({date,type:document.getElementById('vf-type').value,content:document.getElementById('vf-content').value});
  people[idx].visits.sort((a,b)=>a.date.localeCompare(b.date));
  savePeople(people);hideDetails();showPersonDetail(currentPersonId);
}
function deleteVisit(personId,visitIdx){
  if(!confirm('이 이력을 삭제할까요?'))return;
  const people=loadPeople(),idx=people.findIndex(p=>p.id===personId);
  if(idx<0)return;people[idx].visits.splice(visitIdx,1);
  savePeople(people);renderVisitHistory(people[idx]);
}

// ── 앱 새로고침 ──
async function forceRefresh(){
  try{
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
  }catch(e){console.log('refresh error:',e)}
  location.reload(true);
}

// (시간 입력은 이제 직접입력 방식)
initCal();
renderDashboard();
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
