<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="봉사기록">
<meta name="theme-color" content="#ffffff">
<title>파이오니아 봉사기록</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --primary: #1a1a1a;
  --bg: #ffffff;
  --bg2: #f5f5f5;
  --bg3: #efefef;
  --border: rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --text1: #1a1a1a;
  --text2: #666666;
  --text3: #999999;
  --green: #1D9E75;
  --green-bg: #e1f5ee;
  --green-text: #0F6E56;
  --red: #D85A30;
  --red-bg: #FAECE7;
  --red-text: #993C1D;
  --blue: #185FA5;
  --blue-bg: #E6F1FB;
  --purple: #534AB7;
  --purple-bg: #EEEDFE;
  --pink: #993556;
  --pink-bg: #FBEAF0;
  --nav-h: 60px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --primary: #f0f0f0;
    --bg: #1c1c1e;
    --bg2: #2c2c2e;
    --bg3: #3a3a3c;
    --border: rgba(255,255,255,0.12);
    --border2: rgba(255,255,255,0.22);
    --text1: #f0f0f0;
    --text2: #aaaaaa;
    --text3: #666666;
    --green: #30d158;
    --green-bg: #0a3a24;
    --green-text: #30d158;
    --red: #ff6b47;
    --red-bg: #3a1a0a;
    --red-text: #ff6b47;
    --blue: #5e9fe0;
    --blue-bg: #0a2040;
    --purple: #9b94e8;
    --purple-bg: #1a1840;
    --pink: #d96fa0;
    --pink-bg: #3a1030;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text1); font-family: -apple-system, 'Malgun Gothic', sans-serif; overflow: hidden; }
#app { height: 100%; display: flex; flex-direction: column; }
.header { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
.header h1 { font-size: 17px; font-weight: 600; color: var(--text1); }
.header p { font-size: 12px; color: var(--text2); margin-top: 2px; }
.content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + var(--safe-b) + 10px); }
.nav { height: var(--nav-h); border-top: 0.5px solid var(--border); display: flex; flex-shrink: 0; padding-bottom: var(--safe-b); background: var(--bg); }
.nav button { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 10px; border: none; background: none; cursor: pointer; color: var(--text3); padding: 0; }
.nav button.active { color: var(--primary); }
.nav button svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.page { display: none; padding: 14px 16px; }
.page.active { display: block; }
.detail-page { display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; z-index: 10; padding: 14px 16px calc(20px + var(--safe-b)); }
.detail-page.active { display: block; }
.sec-title { font-size: 13px; font-weight: 600; color: var(--text1); margin: 16px 0 10px; display: flex; justify-content: space-between; align-items: center; }
.sec-title:first-child { margin-top: 0; }
.metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }
.metric { background: var(--bg2); border-radius: 12px; padding: 12px; }
.metric .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.metric .val { font-size: 22px; font-weight: 600; color: var(--text1); line-height: 1; }
.metric .sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.metric.full { grid-column: 1/-1; }
.prog { height: 7px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin-top: 8px; }
.prog-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.4s ease; }
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.form-row { margin-bottom: 13px; }
.form-row label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.form-row input, .form-row select, .form-row textarea {
  width: 100%; padding: 10px 12px; font-size: 15px;
  border: 0.5px solid var(--border2); border-radius: 10px;
  background: var(--bg2); color: var(--text1);
  font-family: -apple-system, 'Malgun Gothic', sans-serif;
  appearance: none; -webkit-appearance: none;
}
.form-row textarea { resize: none; height: 80px; line-height: 1.5; }
.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-primary { width: 100%; padding: 14px; background: var(--primary); color: var(--bg); border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: inherit; }
.btn-sm { padding: 6px 12px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 8px; background: none; cursor: pointer; color: var(--text1); font-family: inherit; display: flex; align-items: center; gap: 4px; }
.btn-icon { background: none; border: none; cursor: pointer; color: var(--text3); padding: 6px; display: flex; align-items: center; }
.btn-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 500; }
.b-ldc { background: var(--blue-bg); color: var(--blue); }
.b-edu { background: var(--green-bg); color: var(--green-text); }
.b-study { background: var(--purple-bg); color: var(--purple); }
.b-visit { background: var(--red-bg); color: var(--red-text); }
.b-research { background: var(--purple-bg); color: var(--purple); }
.b-m { background: var(--blue-bg); color: var(--blue); }
.b-f { background: var(--pink-bg); color: var(--pink); }
.empty { text-align: center; padding: 36px 0; color: var(--text3); font-size: 14px; }
.person-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 14px; padding: 13px; margin-bottom: 9px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
.person-card:active { background: var(--bg2); }
.avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; flex-shrink: 0; }
.avatar.m { background: var(--blue-bg); color: var(--blue); }
.avatar.f { background: var(--pink-bg); color: var(--pink); }
.avatar.n { background: var(--bg3); color: var(--text2); }
.chevron svg { width: 16px; height: 16px; stroke: var(--text3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.search-bar { width: 100%; padding: 10px 12px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: 10px; background: var(--bg2); color: var(--text1); font-family: inherit; margin-bottom: 10px; }
.filter-row { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 2px; }
.filter-btn { padding: 5px 12px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: 20px; background: none; cursor: pointer; color: var(--text2); white-space: nowrap; font-family: inherit; flex-shrink: 0; }
.filter-btn.on { background: var(--primary); color: var(--bg); border-color: var(--primary); }
.sort-sel { font-size: 12px; padding: 5px 10px; border: 0.5px solid var(--border2); border-radius: 8px; background: var(--bg2); color: var(--text1); font-family: inherit; -webkit-appearance: none; }
.back-btn { display: flex; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; color: var(--text1); font-size: 15px; font-family: inherit; padding: 0; }
.back-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.hist-item { padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.hist-item:last-child { border-bottom: none; }
.yearly-row { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
.yearly-row:last-child { border-bottom: none; }
.detail-row { display: flex; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 13px; }
.detail-row:last-child { border-bottom: none; }
.detail-row .dl { color: var(--text2); min-width: 56px; flex-shrink: 0; }
.detail-row .dv { color: var(--text1); }
.green { color: var(--green); }
.red { color: var(--red); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>파이오니아 봉사기록</h1>
    <p id="header-period"></p>
  </div>

  <div class="content" id="main-content">

    <!-- 홈 -->
    <div id="page-dashboard" class="page active">
      <div class="sec-title">당월 현황</div>
      <div class="metric-grid">
        <div class="metric full">
          <div class="label">당월 총 봉사시간 (목표 50시간)</div>
          <div class="val" id="d-total">0시간</div>
          <div class="prog"><div class="prog-fill" id="d-bar" style="width:0%"></div></div>
          <div class="sub" id="d-remain"></div>
        </div>
        <div class="metric"><div class="label">봉사시간</div><div class="val" id="d-service">0</div><div class="sub">시간</div></div>
        <div class="metric"><div class="label">LDC 시간</div><div class="val" id="d-ldc">0</div><div class="sub">시간</div></div>
        <div class="metric"><div class="label">학교(교육)</div><div class="val" id="d-edu">0</div><div class="sub">시간</div></div>
        <div class="metric"><div class="label">총 연구 수</div><div class="val" id="d-study">0</div><div class="sub">건</div></div>
        <div class="metric full">
          <div class="label">이달 부족/잉여 시간</div>
          <div class="val" id="d-diff">-</div>
        </div>
      </div>
      <div class="sec-title">봉사연도 누계 (9월~8월)</div>
      <div class="metric-grid">
        <div class="metric"><div class="label">연누계 총시간</div><div class="val" id="d-yearly">0</div><div class="sub">시간</div></div>
        <div class="metric"><div class="label">연 부족/잉여</div><div class="val" id="d-yearly-diff">-</div></div>
      </div>
      <div class="sec-title">관심자 현황</div>
      <div class="metric-grid">
        <div class="metric"><div class="label">전체 관심자</div><div class="val" id="d-p-total">0</div><div class="sub">명</div></div>
        <div class="metric"><div class="label">연구 중</div><div class="val" id="d-p-study">0</div><div class="sub">명</div></div>
      </div>
    </div>

    <!-- 기록 추가 -->
    <div id="page-add" class="page">
      <div class="sec-title">봉사 기록 추가</div>
      <div class="card">
        <div class="form-row"><label>날짜</label><input type="date" id="f-date"></div>
        <div class="form-grid2">
          <div class="form-row"><label>봉사시간 (h)</label><input type="number" id="f-service" min="0" step="0.5" placeholder="0" inputmode="decimal"></div>
          <div class="form-row"><label>LDC 시간 (h)</label><input type="number" id="f-ldc" min="0" step="0.5" placeholder="0" inputmode="decimal"></div>
        </div>
        <div class="form-row"><label>LDC 메모</label><input type="text" id="f-ldc-memo" placeholder="LDC 내용 메모"></div>
        <div class="form-grid2">
          <div class="form-row"><label>학교(교육) (h)</label><input type="number" id="f-edu" min="0" step="0.5" placeholder="0" inputmode="decimal"></div>
          <div class="form-row"><label>연구 수 (건)</label><input type="number" id="f-study" min="0" step="1" placeholder="0" inputmode="numeric"></div>
        </div>
        <div class="form-row"><label>교육/연구 메모</label><input type="text" id="f-edu-memo" placeholder="교육·연구 메모"></div>
        <div class="form-row"><label>메모</label><textarea id="f-memo" placeholder="기타 메모..."></textarea></div>
        <button class="btn-primary" onclick="addRecord()">저장</button>
      </div>
    </div>

    <!-- 기록 내역 -->
    <div id="page-records" class="page">
      <div class="sec-title">
        <span>월별 기록</span>
        <select id="month-select" class="sort-sel" onchange="renderRecords()"></select>
      </div>
      <div id="records-list"></div>
    </div>

    <!-- 연누계 -->
    <div id="page-yearly" class="page">
      <div class="sec-title">봉사연도 월별 현황</div>
      <div id="yearly-list"></div>
    </div>

    <!-- 관심자 목록 -->
    <div id="page-people" class="page">
      <div class="sec-title">
        <span>관심자 관리</span>
        <button class="btn-sm" onclick="showPersonForm(null)">
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          추가
        </button>
      </div>
      <input type="text" class="search-bar" placeholder="이름, 주소, 구역 검색..." oninput="renderPeople()" id="people-search">
      <div class="filter-row">
        <button class="filter-btn on" data-filter="all" onclick="setFilter(this)">전체</button>
        <button class="filter-btn" data-filter="재방" onclick="setFilter(this)">재방</button>
        <button class="filter-btn" data-filter="연구" onclick="setFilter(this)">연구</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span style="font-size:12px;color:var(--text2);">정렬</span>
        <select class="sort-sel" id="people-sort" onchange="renderPeople()">
          <option value="name">이름순</option>
          <option value="dong">구역(동)순</option>
          <option value="recent">최근 방문순</option>
          <option value="count">방문 횟수순</option>
        </select>
      </div>
      <div id="people-list"></div>
    </div>

  </div><!-- .content -->

  <nav class="nav">
    <button class="active" onclick="showPage('dashboard')" id="nav-dashboard">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      홈
    </button>
    <button onclick="showPage('add')" id="nav-add">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      기록
    </button>
    <button onclick="showPage('records')" id="nav-records">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      내역
    </button>
    <button onclick="showPage('yearly')" id="nav-yearly">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      연누계
    </button>
    <button onclick="showPage('people')" id="nav-people">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      관심자
    </button>
  </nav>
</div><!-- #app -->

<!-- 인물 상세 -->
<div id="page-person-detail" class="detail-page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <button class="back-btn" onclick="backToPeople()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      목록
    </button>
    <div style="display:flex;gap:8px;">
      <button class="btn-sm" onclick="editPerson()">
        <svg style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        수정
      </button>
      <button class="btn-sm" style="color:var(--red);" onclick="deletePerson()">
        <svg style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        삭제
      </button>
    </div>
  </div>
  <div id="person-detail-content"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin:20px 0 10px;">
    <span style="font-size:13px;font-weight:600;">재방 이력</span>
    <button class="btn-sm" onclick="showVisitForm()">
      <svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      기록 추가
    </button>
  </div>
  <div id="visit-history"></div>
</div>

<!-- 인물 추가/수정 폼 -->
<div id="page-person-form" class="detail-page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <button class="back-btn" onclick="cancelPersonForm()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      취소
    </button>
    <span style="font-size:15px;font-weight:600;" id="person-form-title">관심자 추가</span>
    <div style="width:40px;"></div>
  </div>
  <div class="card">
    <div class="form-grid2">
      <div class="form-row"><label>이름 *</label><input type="text" id="pf-name" placeholder="홍길동"></div>
      <div class="form-row"><label>성별</label>
        <select id="pf-gender"><option value="">선택</option><option value="남">남</option><option value="여">여</option></select>
      </div>
      <div class="form-row"><label>나이</label><input type="number" id="pf-age" min="0" placeholder="45" inputmode="numeric"></div>
      <div class="form-row"><label>방문 형식</label>
        <select id="pf-type"><option value="재방">재방</option><option value="연구">연구</option></select>
      </div>
    </div>
    <div class="form-row"><label>주소</label><input type="text" id="pf-address" placeholder="예) 흥덕구 가경동 123"></div>
    <div class="form-grid2">
      <div class="form-row"><label>구역(동)</label><input type="text" id="pf-dong" placeholder="가경동"></div>
      <div class="form-row"><label>지역</label><input type="text" id="pf-region" placeholder="흥덕구"></div>
    </div>
    <div class="form-row"><label>메모</label><textarea id="pf-memo" placeholder="관심 주제, 특이사항 등..."></textarea></div>
    <button class="btn-primary" onclick="savePerson()">저장</button>
  </div>
</div>

<!-- 재방 기록 폼 -->
<div id="page-visit-form" class="detail-page">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
    <button class="back-btn" onclick="cancelVisitForm()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      취소
    </button>
    <span style="font-size:15px;font-weight:600;">재방 기록 추가</span>
    <div style="width:40px;"></div>
  </div>
  <div class="card">
    <div class="form-row"><label>날짜 *</label><input type="date" id="vf-date"></div>
    <div class="form-row"><label>방문 형식</label>
      <select id="vf-type"><option value="재방">재방</option><option value="연구">연구</option></select>
    </div>
    <div class="form-row"><label>내용</label><textarea id="vf-content" placeholder="대화 내용, 나눈 자료, 반응 등..."></textarea></div>
    <button class="btn-primary" onclick="saveVisit()">저장</button>
  </div>
</div>

<script>
const MONTHLY_GOAL = 50, YEARLY_GOAL = 600;
let currentPersonId = null, editPersonId = null, peopleFilter = 'all';

function pad(n){ return String(n).padStart(2,'0'); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function getMonthKey(ds){ return ds.slice(0,7); }
function getServiceYear(d){ d=d||new Date(); return (d.getMonth()+1)>=9?d.getFullYear():d.getFullYear()-1; }
function getServiceMonths(sy){
  const ms=[];
  for(let i=0;i<12;i++){ const m=(8+i)%12+1; const y=m>=9?sy:sy+1; ms.push({year:y,month:m}); }
  return ms;
}
function loadRec(){ try{ return JSON.parse(localStorage.getItem('p_rec')||'[]'); }catch(e){ return []; } }
function saveRec(d){ localStorage.setItem('p_rec',JSON.stringify(d)); }
function loadPeople(){ try{ return JSON.parse(localStorage.getItem('p_ppl')||'[]'); }catch(e){ return []; } }
function savePeople(d){ localStorage.setItem('p_ppl',JSON.stringify(d)); }

function sumMonth(recs,ym){
  return recs.filter(r=>getMonthKey(r.date)===ym).reduce((a,r)=>{
    a.service+=(r.service||0); a.ldc+=(r.ldc||0); a.edu+=(r.edu||0); a.study+=(r.study||0);
    a.total+=(r.service||0)+(r.ldc||0)+(r.edu||0); return a;
  },{service:0,ldc:0,edu:0,study:0,total:0});
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  document.getElementById('main-content').scrollTop=0;
  if(id==='dashboard') renderDashboard();
  if(id==='records') renderRecords();
  if(id==='yearly') renderYearly();
  if(id==='people') renderPeople();
}

function hideDetails(){
  document.querySelectorAll('.detail-page').forEach(p=>p.classList.remove('active'));
}

function renderDashboard(){
  const recs=loadRec(), people=loadPeople(), now=new Date();
  const curKey=now.getFullYear()+'-'+pad(now.getMonth()+1);
  const ms=sumMonth(recs,curKey);
  const pct=Math.min(Math.round(ms.total/MONTHLY_GOAL*100),100);
  const diff=+(ms.total-MONTHLY_GOAL).toFixed(1);
  document.getElementById('d-total').textContent=ms.total.toFixed(1)+'시간';
  document.getElementById('d-bar').style.width=pct+'%';
  document.getElementById('d-service').textContent=ms.service.toFixed(1);
  document.getElementById('d-ldc').textContent=ms.ldc.toFixed(1);
  document.getElementById('d-edu').textContent=ms.edu.toFixed(1);
  document.getElementById('d-study').textContent=ms.study;
  document.getElementById('d-remain').textContent=pct+'% 달성 · 남은 목표 '+Math.max(0,MONTHLY_GOAL-ms.total).toFixed(1)+'시간';
  const diffEl=document.getElementById('d-diff');
  if(diff>=0){ diffEl.textContent='+'+diff+'시간 잉여'; diffEl.className='val green'; }
  else{ diffEl.textContent=diff+'시간 부족'; diffEl.className='val red'; }
  const sy=getServiceYear(now), sms=getServiceMonths(sy);
  let yt=0; sms.forEach(sm=>{ yt+=sumMonth(recs,sm.year+'-'+pad(sm.month)).total; });
  const elapsed=sms.filter(sm=>new Date(sm.year,sm.month-1,1)<=now).length;
  const ydiff=+(yt-(elapsed*MONTHLY_GOAL)).toFixed(1);
  document.getElementById('d-yearly').textContent=yt.toFixed(1);
  const ydEl=document.getElementById('d-yearly-diff');
  if(ydiff>=0){ ydEl.textContent='+'+ydiff+'시간 잉여'; ydEl.className='val green'; }
  else{ ydEl.textContent=ydiff+'시간 부족'; ydEl.className='val red'; }
  document.getElementById('d-p-total').textContent=people.length;
  document.getElementById('d-p-study').textContent=people.filter(p=>p.type==='연구').length;
  const sy2=getServiceYear(now);
  document.getElementById('header-period').textContent=sy2+'~'+(sy2+1)+' 봉사연도';
}

function addRecord(){
  const date=document.getElementById('f-date').value;
  if(!date){ alert('날짜를 선택해주세요'); return; }
  const r={ date,
    service:parseFloat(document.getElementById('f-service').value)||0,
    ldc:parseFloat(document.getElementById('f-ldc').value)||0,
    ldcMemo:document.getElementById('f-ldc-memo').value,
    edu:parseFloat(document.getElementById('f-edu').value)||0,
    eduMemo:document.getElementById('f-edu-memo').value,
    study:parseInt(document.getElementById('f-study').value)||0,
    memo:document.getElementById('f-memo').value };
  const recs=loadRec(); recs.push(r); saveRec(recs);
  ['f-service','f-ldc','f-ldc-memo','f-edu','f-edu-memo','f-study','f-memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-date').value=todayStr();
  alert('저장되었습니다!'); showPage('dashboard');
}

function buildMonthSelect(){
  const sel=document.getElementById('month-select'); sel.innerHTML='';
  const now=new Date(), sy=getServiceYear(now), sms=getServiceMonths(sy);
  const curKey=now.getFullYear()+'-'+pad(now.getMonth()+1);
  sms.forEach(sm=>{ const key=sm.year+'-'+pad(sm.month); const o=document.createElement('option'); o.value=key; o.textContent=sm.month+'월'; if(key===curKey)o.selected=true; sel.appendChild(o); });
}

function renderRecords(){
  buildMonthSelect();
  const recs=loadRec(), key=document.getElementById('month-select').value;
  const filtered=recs.filter(r=>getMonthKey(r.date)===key).sort((a,b)=>b.date.localeCompare(a.date));
  const list=document.getElementById('records-list');
  if(!filtered.length){ list.innerHTML='<div class="empty">이 달 기록이 없습니다</div>'; return; }
  list.innerHTML=filtered.map(r=>{
    const total=(r.service||0)+(r.ldc||0)+(r.edu||0);
    const idx=recs.findIndex(x=>x===r);
    const badges=[
      r.ldc?`<span class="badge b-ldc">LDC ${r.ldc}h${r.ldcMemo?' · '+r.ldcMemo:''}</span>`:'',
      r.edu?`<span class="badge b-edu">학교 ${r.edu}h</span>`:'',
      r.study?`<span class="badge b-study">연구 ${r.study}건</span>`:''
    ].join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:13px;color:var(--text2);">${r.date}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:15px;font-weight:600;">${total.toFixed(1)}h</span>
          <button class="btn-icon" onclick="deleteRecord(${recs.indexOf(r)})">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px;">봉사 ${(r.service||0).toFixed(1)}h ${badges}</div>
      ${r.eduMemo?`<div style="font-size:12px;color:var(--text2);margin-top:3px;">교육: ${r.eduMemo}</div>`:''}
      ${r.memo?`<div style="font-size:12px;color:var(--text3);margin-top:4px;font-style:italic;">${r.memo}</div>`:''}
    </div>`;
  }).join('');
}

function deleteRecord(idx){ if(!confirm('이 기록을 삭제할까요?'))return; const r=loadRec(); r.splice(idx,1); saveRec(r); renderRecords(); }

function renderYearly(){
  const recs=loadRec(), now=new Date(), sy=getServiceYear(now), sms=getServiceMonths(sy);
  let yt=0;
  const rows=sms.map(sm=>{
    const key=sm.year+'-'+pad(sm.month), s=sumMonth(recs,key);
    yt+=s.total;
    const isFuture=new Date(sm.year,sm.month-1,1)>now;
    const pct=Math.min(Math.round(s.total/MONTHLY_GOAL*100),100);
    return `<div class="yearly-row">
      <span style="font-size:13px;min-width:30px;">${sm.month}월</span>
      <div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;">
        <div style="height:100%;background:var(--green);border-radius:3px;width:${isFuture?0:pct}%"></div>
      </div>
      <span style="font-size:13px;font-weight:600;min-width:48px;text-align:right;">${isFuture?'-':s.total.toFixed(1)+'h'}</span>
    </div>`;
  }).join('');
  document.getElementById('yearly-list').innerHTML=`
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;color:var(--text2);">${sy}~${sy+1} 연도 누계</span>
        <span style="font-size:18px;font-weight:600;">${yt.toFixed(1)}h / 600h</span>
      </div>
      <div class="prog" style="margin-top:8px;"><div class="prog-fill" style="width:${Math.min(Math.round(yt/YEARLY_GOAL*100),100)}%"></div></div>
    </div>
    <div class="card">${rows}</div>`;
}

function setFilter(btn){ peopleFilter=btn.dataset.filter; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on')); btn.classList.add('on'); renderPeople(); }

function renderPeople(){
  const people=loadPeople();
  const q=(document.getElementById('people-search').value||'').toLowerCase();
  const sort=document.getElementById('people-sort').value;
  let filtered=people.filter(p=>{
    if(peopleFilter!=='all'&&p.type!==peopleFilter)return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.address||'').toLowerCase().includes(q)&&!(p.dong||'').includes(q))return false;
    return true;
  });
  filtered.sort((a,b)=>{
    if(sort==='name')return a.name.localeCompare(b.name);
    if(sort==='dong')return(a.dong||'').localeCompare(b.dong||'');
    if(sort==='recent'){ const la=(a.visits||[]).length?a.visits[a.visits.length-1].date:'0'; const lb=(b.visits||[]).length?b.visits[b.visits.length-1].date:'0'; return lb.localeCompare(la); }
    if(sort==='count')return(b.visits||[]).length-(a.visits||[]).length;
    return 0;
  });
  const list=document.getElementById('people-list');
  if(!filtered.length){ list.innerHTML='<div class="empty">등록된 관심자가 없습니다</div>'; return; }
  list.innerHTML=filtered.map(p=>{
    const initials=p.name.slice(-2);
    const vcount=(p.visits||[]).length;
    const lastVisit=vcount?p.visits[vcount-1].date:'없음';
    const gc=p.gender==='여'?'f':p.gender==='남'?'m':'n';
    const typeBadge=p.type==='연구'?'<span class="badge b-research">연구</span>':'<span class="badge b-visit">재방</span>';
    const gBadge=p.gender?`<span class="badge ${gc==='f'?'b-f':'b-m'}">${p.gender}</span>`:'';
    return `<div class="person-card" onclick="showPersonDetail('${p.id}')">
      <div class="avatar ${gc}">${initials}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap;">
          <span style="font-size:15px;font-weight:600;">${p.name}</span>
          ${gBadge}${p.age?`<span style="font-size:12px;color:var(--text2);">${p.age}세</span>`:''}${typeBadge}
        </div>
        <div style="font-size:12px;color:var(--text2);">${p.dong?p.dong+' · ':''}재방 ${vcount}회 · 최근 ${lastVisit}</div>
      </div>
      <div class="chevron"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
    </div>`;
  }).join('');
}

function showPersonDetail(id){
  currentPersonId=id;
  const people=loadPeople(), p=people.find(x=>x.id===id);
  if(!p)return;
  hideDetails();
  document.getElementById('page-person-detail').classList.add('active');
  const gc=p.gender==='여'?'f':p.gender==='남'?'m':'n';
  const rows=[
    p.gender?['성별',p.gender]:[],
    p.age?['나이',p.age+'세']:[],
    p.type?['방문형식',p.type]:[],
    p.address?['주소',p.address]:[],
    (p.dong||p.region)?['구역',[p.region,p.dong].filter(Boolean).join(' · ')]:[],
    p.memo?['메모',p.memo]:[]
  ].filter(r=>r.length).map(([l,v])=>`<div class="detail-row"><span class="dl">${l}</span><span class="dv">${v}</span></div>`).join('');
  document.getElementById('person-detail-content').innerHTML=`
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
        <div class="avatar ${gc}" style="width:50px;height:50px;font-size:18px;">${p.name.slice(-2)}</div>
        <div>
          <div style="font-size:18px;font-weight:600;">${p.name}</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;">${(p.visits||[]).length}회 방문 기록</div>
        </div>
      </div>
      ${rows}
    </div>`;
  renderVisitHistory(p);
}

function renderVisitHistory(p){
  const visits=(p.visits||[]).slice().reverse();
  const el=document.getElementById('visit-history');
  if(!visits.length){ el.innerHTML='<div class="empty">재방 이력이 없습니다</div>'; return; }
  el.innerHTML=`<div class="card">${visits.map((v,ri)=>{
    const realIdx=p.visits.length-1-ri;
    return `<div class="hist-item">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:13px;font-weight:600;">${v.date}</span>
          <span class="badge ${v.type==='연구'?'b-research':'b-visit'}">${v.type||'재방'}</span>
          <span style="font-size:12px;color:var(--text3);">${realIdx+1}회차</span>
        </div>
        <button class="btn-icon" onclick="deleteVisit('${p.id}',${realIdx})">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
      ${v.content?`<div style="font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5;">${v.content}</div>`:''}
    </div>`;
  }).join('')}</div>`;
}

function showPersonForm(id){
  editPersonId=id||null;
  hideDetails();
  document.getElementById('page-person-form').classList.add('active');
  if(id){
    const p=loadPeople().find(x=>x.id===id);
    document.getElementById('person-form-title').textContent='관심자 수정';
    document.getElementById('pf-name').value=p.name||'';
    document.getElementById('pf-gender').value=p.gender||'';
    document.getElementById('pf-age').value=p.age||'';
    document.getElementById('pf-type').value=p.type||'재방';
    document.getElementById('pf-address').value=p.address||'';
    document.getElementById('pf-dong').value=p.dong||'';
    document.getElementById('pf-region').value=p.region||'';
    document.getElementById('pf-memo').value=p.memo||'';
  } else {
    document.getElementById('person-form-title').textContent='관심자 추가';
    ['pf-name','pf-age','pf-address','pf-dong','pf-region','pf-memo'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('pf-gender').value='';
    document.getElementById('pf-type').value='재방';
  }
}

function cancelPersonForm(){ hideDetails(); showPage('people'); }

function savePerson(){
  const name=document.getElementById('pf-name').value.trim();
  if(!name){ alert('이름을 입력해주세요'); return; }
  const people=loadPeople();
  const data={ name, gender:document.getElementById('pf-gender').value, age:document.getElementById('pf-age').value, type:document.getElementById('pf-type').value, address:document.getElementById('pf-address').value, dong:document.getElementById('pf-dong').value, region:document.getElementById('pf-region').value, memo:document.getElementById('pf-memo').value };
  if(editPersonId){
    const idx=people.findIndex(p=>p.id===editPersonId);
    if(idx>-1) people[idx]={...people[idx],...data};
  } else {
    people.push({id:'p'+Date.now(),visits:[],...data});
  }
  savePeople(people); hideDetails(); showPage('people');
}

function editPerson(){ showPersonForm(currentPersonId); }

function deletePerson(){
  if(!confirm('이 관심자를 삭제할까요?'))return;
  savePeople(loadPeople().filter(p=>p.id!==currentPersonId));
  hideDetails(); showPage('people');
}

function backToPeople(){ hideDetails(); showPage('people'); }

function showVisitForm(){
  hideDetails();
  document.getElementById('page-visit-form').classList.add('active');
  document.getElementById('vf-date').value=todayStr();
  document.getElementById('vf-content').value='';
  document.getElementById('vf-type').value='재방';
}

function cancelVisitForm(){ hideDetails(); showPersonDetail(currentPersonId); }

function saveVisit(){
  const date=document.getElementById('vf-date').value;
  if(!date){ alert('날짜를 선택해주세요'); return; }
  const people=loadPeople(), idx=people.findIndex(p=>p.id===currentPersonId);
  if(idx<0)return;
  if(!people[idx].visits) people[idx].visits=[];
  people[idx].visits.push({ date, type:document.getElementById('vf-type').value, content:document.getElementById('vf-content').value });
  people[idx].visits.sort((a,b)=>a.date.localeCompare(b.date));
  savePeople(people); hideDetails(); showPersonDetail(currentPersonId);
}

function deleteVisit(personId,visitIdx){
  if(!confirm('이 이력을 삭제할까요?'))return;
  const people=loadPeople(), idx=people.findIndex(p=>p.id===personId);
  if(idx<0)return;
  people[idx].visits.splice(visitIdx,1);
  savePeople(people); renderVisitHistory(people[idx]);
}

// 초기화
document.getElementById('f-date').value=todayStr();
renderDashboard();

// PWA 서비스워커 등록
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
