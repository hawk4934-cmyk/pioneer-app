<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연간 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f6f0;min-height:100vh;color:#1a1a1a}
input,select,textarea,button{font-family:'Noto Sans KR',sans-serif}
.hidden{display:none!important}
.loading-screen{position:fixed;inset:0;background:#f4f6f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
.loading-screen .logo{font-family:'DM Serif Display',serif;font-size:28px;color:#3B6D11}
.spinner{width:36px;height:36px;border:3px solid #dde8d0;border-top-color:#3B6D11;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:13px;color:#aaa}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:#f4f6f0}
.login-card{background:#fff;border:1px solid #dde8d0;border-radius:16px;padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.login-logo{font-family:'DM Serif Display',serif;font-size:24px;color:#3B6D11;margin-bottom:1.5rem;text-align:center}
.login-tabs{display:flex;gap:8px;margin-bottom:1.5rem}
.login-tab{flex:1;padding:8px;border-radius:8px;border:1px solid #dde8d0;background:transparent;font-size:13px;cursor:pointer;color:#888;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.login-tab.active{background:#EAF3DE;color:#3B6D11;border-color:#97C459;font-weight:500}
.login-card input{width:100%;margin-bottom:10px;padding:10px 14px;border-radius:8px;border:1px solid #dde8d0;background:#f9fdf5;color:#1a1a1a;font-size:14px;outline:none;transition:border-color .2s}
.login-card input:focus{border-color:#639922}
.btn-login{width:100%;padding:11px;border-radius:8px;border:none;background:#3B6D11;color:#fff;font-size:14px;cursor:pointer;font-weight:500;font-family:'Noto Sans KR',sans-serif;transition:background .2s;margin-top:4px}
.btn-login:hover{background:#27500A}
.login-err{color:#993C1D;font-size:12px;margin-bottom:8px;padding:8px 12px;background:#FAECE7;border-radius:6px}
.login-hint{text-align:center;margin-top:16px;font-size:11px;color:#bbb}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#fff;border-bottom:1px solid #dde8d0;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.topbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.app-logo{font-family:'DM Serif Display',serif;font-size:18px;color:#3B6D11;white-space:nowrap}
.user-tag{display:flex;align-items:center;gap:6px;font-size:12px;color:#666;background:#f4f6f0;padding:4px 10px;border-radius:20px}
.avatar-sm{width:22px;height:22px;border-radius:50%;background:#C0DD97;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#3B6D11}
.year-nav{display:flex;align-items:center;gap:6px}
.year-nav button{background:#f4f6f0;border:1px solid #dde8d0;color:#333;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;transition:all .2s}
.year-nav button:hover{background:#EAF3DE;color:#3B6D11}
.year-nav span{font-size:14px;font-weight:700;color:#3B6D11;min-width:44px;text-align:center}
.tab-row{display:flex;gap:4px}
.tab-btn{padding:5px 12px;border-radius:20px;border:1px solid #dde8d0;background:transparent;color:#888;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.tab-btn.active{background:#EAF3DE;color:#3B6D11;border-color:#97C459;font-weight:500}
.topbar-right{display:flex;gap:6px;align-items:center}
.icon-btn{background:transparent;border:1px solid #dde8d0;color:#666;padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.icon-btn:hover{border-color:#639922;color:#3B6D11}
.logout-btn{background:transparent;border:1px solid #dde8d0;color:#888;padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.logout-btn:hover{background:#FAECE7;color:#993C1D;border-color:#993C1D}
.sync-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:#EAF3DE;color:#3B6D11}
.notif-bell{position:relative;background:transparent;border:1px solid #dde8d0;color:#666;padding:5px 10px;border-radius:8px;font-size:14px;cursor:pointer;transition:all .2s}
.notif-bell:hover{border-color:#639922;color:#3B6D11}
.notif-dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;background:#E24B4A;border-radius:50%;border:2px solid #fff}
.notif-banner{background:#FFF7E0;border:1px solid #F0D98C;border-radius:12px;padding:12px 16px;margin-bottom:14px;display:flex;flex-direction:column;gap:6px}
.notif-banner-title{font-size:12px;font-weight:700;color:#854F0B;display:flex;align-items:center;gap:6px}
.notif-item{font-size:12px;color:#5a4a2a;display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s}
.notif-item:hover{background:#FBF0CC}
.notif-tag{font-size:10px;padding:1px 8px;border-radius:8px;font-weight:600;flex-shrink:0}
.notif-tag.today{background:#FAECE7;color:#993C1D}
.notif-tag.tomorrow{background:#E6F1FB;color:#185FA5}

/* VIEWS */
.view{padding:20px;max-width:1200px;margin:0 auto;width:100%}
.annual-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.month-card{background:#fff;border:1px solid #dde8d0;border-radius:14px;padding:16px;transition:box-shadow .2s}
.month-card:hover{box-shadow:0 2px 12px rgba(99,153,34,.1)}
.month-title{font-size:12px;font-weight:700;color:#3B6D11;margin-bottom:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-dow{text-align:center;font-size:9px;color:#bbb;padding:3px 0;font-weight:500}
.cal-dow:first-child{color:#E24B4A}.cal-dow:last-child{color:#185FA5}
.cal-day{text-align:center;font-size:10px;padding:4px 2px;border-radius:5px;color:#bbb;cursor:default;transition:all .15s}
.cal-day.has-ev{background:#EAF3DE;color:#3B6D11;cursor:pointer;font-weight:700}
.cal-day.has-ev:hover{background:#639922;color:#fff;transform:scale(1.1)}
.cal-day.multi-ev{background:#C0DD97}
.cal-day.today{outline:2px solid #639922;color:#3B6D11;font-weight:700;border-radius:50%}
.cal-day.sun{color:#E24B4A}.cal-day.sat{color:#185FA5}
.cal-day.has-ev.sun,.cal-day.has-ev.sat{color:#27500A}
.ev-dot{width:4px;height:4px;border-radius:50%;background:#639922;margin:1px auto 0}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.month-nav button{background:#f4f6f0;border:1px solid #dde8d0;color:#333;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;transition:all .2s}
.month-nav button:hover{background:#EAF3DE;color:#3B6D11}
.month-nav span{font-size:16px;font-weight:700;color:#3B6D11}
.monthly-cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px}
.m-dow{text-align:center;font-size:12px;color:#888;padding:8px 0;font-weight:500}
.m-dow:first-child{color:#E24B4A}.m-dow:last-child{color:#185FA5}
.m-day{min-height:80px;background:#fff;border:1px solid #dde8d0;border-radius:10px;padding:8px;cursor:pointer;transition:border-color .15s}
.m-day:hover{border-color:#97C459}
.m-day.today{border-color:#639922;border-width:2px}
.m-day.other-month{background:#f9f9f9;opacity:.5}
.m-day-num{font-size:12px;font-weight:600;color:#888;margin-bottom:4px}
.m-day.today .m-day-num{color:#3B6D11}
.m-day.sun .m-day-num{color:#E24B4A}.m-day.sat .m-day-num{color:#185FA5}
.m-ev-chip{font-size:9px;padding:2px 6px;border-radius:4px;background:#EAF3DE;color:#3B6D11;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:all .15s}
.m-ev-chip:hover{background:#639922;color:#fff}
.m-ev-chip.multi-day{background:#C0DD97}
.list-header{margin-bottom:14px}
.list-filter{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:5px 14px;border-radius:14px;border:1px solid #dde8d0;background:transparent;font-size:12px;color:#888;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.filter-chip.active{background:#EAF3DE;color:#3B6D11;border-color:#97C459;font-weight:500}
.list-items{display:flex;flex-direction:column;gap:8px}
.list-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #dde8d0;border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .2s;flex-wrap:nowrap;overflow:hidden}
.list-item:hover{border-color:#97C459;box-shadow:0 2px 8px rgba(99,153,34,.08)}
.list-item.done-item{opacity:.6}
.list-item.done-item .li-title{text-decoration:line-through;color:#aaa}
.li-date{font-size:12px;font-weight:700;color:#3B6D11;min-width:64px;flex-shrink:0}
.li-range{font-size:10px;color:#aaa;margin-top:2px}
.li-cat{font-size:10px;padding:2px 8px;border-radius:10px;background:#EAF3DE;color:#3B6D11;white-space:nowrap;font-weight:500;flex-shrink:0}
.li-title{flex:1;font-size:13px;color:#1a1a1a;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li-place{font-size:11px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;flex-shrink:0}
.li-check{width:22px;height:22px;border-radius:50%;border:2px solid #dde8d0;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;flex-shrink:0;transition:all .2s}
.li-check:hover{border-color:#639922}
.li-check.done{background:#639922;border-color:#639922;color:#fff}
.empty-state{text-align:center;padding:60px 20px;color:#aaa;font-size:14px}
.fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#3B6D11;color:#fff;font-size:26px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(59,109,17,.35);z-index:50;transition:all .2s}
.fab:hover{background:#27500A;transform:scale(1.1) rotate(90deg)}

/* OVERLAY & MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)}
.modal{background:#fff;border:1px solid #dde8d0;border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:28px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-hdr h3{font-size:17px;font-weight:700;color:#1a1a1a}
.close-btn{background:transparent;border:1px solid #dde8d0;border-radius:50%;width:30px;height:30px;cursor:pointer;color:#888;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.close-btn:hover{background:#FAECE7;color:#993C1D;border-color:#993C1D}
.form-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:120px}
.form-group label{font-size:11px;color:#888;font-weight:600;letter-spacing:.5px}
.form-group input,.form-group select,.form-group textarea{border-radius:8px;border:1px solid #dde8d0;background:#f9fdf5;color:#1a1a1a;font-size:13px;padding:8px 12px;outline:none;transition:border-color .2s;font-family:'Noto Sans KR',sans-serif}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#639922}
.section-lbl{font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #f0f0f0}
.tl-list{display:flex;flex-direction:column;gap:6px}
.tl-row{display:flex;align-items:center;gap:8px;background:#f9fdf5;border-radius:8px;padding:8px 10px;border:1px solid #dde8d0}
.tl-time-in{width:56px;border:none;background:transparent;font-size:12px;color:#3B6D11;font-weight:700;outline:none}
.tl-sep{color:#ddd;font-size:12px}
.tl-text-in{flex:1;border:none;background:transparent;font-size:13px;color:#1a1a1a;outline:none}
.tl-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid #dde8d0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .2s}
.tl-chk.done{background:#639922;border-color:#639922;color:#fff}
.tl-del{background:transparent;border:none;color:#ccc;cursor:pointer;font-size:16px;padding:0 2px;transition:color .2s}
.tl-del:hover{color:#E24B4A}
.add-tl-btn{display:flex;align-items:center;justify-content:center;gap:6px;background:transparent;border:1px dashed #dde8d0;border-radius:8px;padding:9px 12px;font-size:12px;color:#aaa;cursor:pointer;width:100%;transition:all .2s;font-family:'Noto Sans KR',sans-serif;margin-top:4px}
.add-tl-btn:hover{border-color:#639922;color:#3B6D11}
.checklist{display:flex;flex-direction:column;gap:6px}
.cl-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.cl-chk{width:18px;height:18px;border-radius:4px;border:1.5px solid #dde8d0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .2s}
.cl-chk.done{background:#639922;border-color:#639922;color:#fff}
.cl-text{flex:1;border:none;background:transparent;font-size:13px;color:#1a1a1a;outline:none;border-bottom:1px solid transparent;transition:border-color .2s;padding:2px 0}
.cl-text:focus{border-bottom-color:#dde8d0}
.cl-del{background:transparent;border:none;color:#ccc;cursor:pointer;font-size:14px;transition:color .2s}
.cl-del:hover{color:#E24B4A}
.modal-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0;flex-wrap:wrap;gap:8px}
.status-pill{padding:6px 16px;border-radius:14px;border:none;font-size:12px;cursor:pointer;font-weight:600;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.status-pill.pending{background:#FAECE7;color:#993C1D}
.status-pill.done{background:#EAF3DE;color:#3B6D11}
.btn-row{display:flex;gap:8px}
.btn{padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;font-family:'Noto Sans KR',sans-serif;transition:all .2s;border:1px solid #dde8d0;background:transparent;color:#333}
.btn:hover{background:#f4f6f0}
.btn-primary{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-primary:hover{background:#27500A}
.btn-danger{color:#993C1D;border-color:#993C1D}
.btn-danger:hover{background:#FAECE7}
.btn-doc{color:#185FA5;border-color:#185FA5;font-size:12px;padding:6px 14px}
.btn-doc:hover{background:#E6F1FB}
.doc-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.cat-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.cat-row{display:flex;align-items:center;gap:10px}
.cat-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.cat-name-in{flex:1;border:1px solid #dde8d0;background:#f9fdf5;border-radius:8px;padding:7px 10px;font-size:13px;color:#1a1a1a;outline:none;font-family:'Noto Sans KR',sans-serif}
.cat-name-in:focus{border-color:#639922}
.cat-del{background:transparent;border:none;color:#ccc;cursor:pointer;font-size:16px;transition:color .2s}
.cat-del:hover{color:#E24B4A}
#doc-body-in{width:100%;min-height:160px;border-radius:8px;border:1px solid #dde8d0;background:#f9fdf5;color:#1a1a1a;font-size:13px;padding:12px;font-family:'Noto Sans KR',sans-serif;resize:vertical;outline:none}
#doc-body-in:focus{border-color:#639922}

/* MASTER */
.master-screen{display:none;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:2rem;background:#f4f6f0}
.master-card{background:#fff;border:1px solid #dde8d0;border-radius:16px;padding:2rem;width:100%;max-width:600px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.master-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.master-hdr h2{font-size:18px;font-weight:700;color:#1a1a1a}
.master-badge{background:#534AB7;color:#fff;font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.user-mgmt-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.user-mgmt-row{display:flex;align-items:center;gap:12px;background:#f9fdf5;border:1px solid #dde8d0;border-radius:10px;padding:12px 16px}
.u-avatar{width:36px;height:36px;border-radius:50%;background:#C0DD97;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#3B6D11;flex-shrink:0}
.u-info{flex:1}
.u-name{font-size:14px;font-weight:600;color:#1a1a1a}
.u-id{font-size:11px;color:#aaa}
.u-pw{font-size:11px;color:#639922;margin-top:2px;font-weight:500}
.u-actions{display:flex;gap:6px}
.u-btn{padding:5px 12px;border-radius:6px;border:1px solid #dde8d0;background:transparent;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;color:#333}
.u-btn:hover{background:#EAF3DE;border-color:#97C459;color:#3B6D11}
.u-btn.del{color:#993C1D;border-color:#993C1D}
.u-btn.del:hover{background:#FAECE7}
.master-add-form{background:#f4f6f0;border-radius:10px;padding:16px;margin-top:8px}
.master-add-form h4{font-size:13px;font-weight:600;color:#555;margin-bottom:12px}
.master-input-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.master-input-row input{flex:1;min-width:100px;padding:8px 12px;border-radius:8px;border:1px solid #dde8d0;background:#fff;font-size:13px;outline:none;font-family:'Noto Sans KR',sans-serif}
.master-input-row input:focus{border-color:#639922}
.pw-change-form{background:#f9fdf5;border:1px solid #dde8d0;border-radius:10px;padding:14px;margin-top:10px}
.pw-change-form h4{font-size:12px;font-weight:600;color:#555;margin-bottom:10px}

@media(max-width:600px){
  .annual-grid{grid-template-columns:repeat(2,1fr)}
  .monthly-cal{gap:2px;grid-template-columns:repeat(7,minmax(0,1fr))}
  .m-day{min-height:52px;padding:3px 2px;border-radius:6px}
  .m-day-num{font-size:10px;margin-bottom:2px}
  .m-dow{font-size:10px;padding:4px 0}
  .m-ev-chip{font-size:7.5px;padding:1px 3px;border-radius:3px;margin-bottom:1px}
  .month-nav span{font-size:14px}
  .month-nav button{width:28px;height:28px;font-size:14px}
  .topbar{padding:10px 12px}
  .view{padding:12px}
  .modal{padding:18px}
  .master-card{padding:1rem}
}
@media(max-width:400px){
  .annual-grid{grid-template-columns:1fr}
  .m-day{min-height:46px}
  .m-ev-chip{font-size:7px}
}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="logo">📅 연간 플래너</div>
  <div class="spinner"></div>
  <div class="loading-msg" id="loading-msg">연결 중...</div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="hidden">
  <div class="login-card">
    <div class="login-logo">📅 연간 플래너</div>
    <div class="login-tabs">
      <button class="login-tab active" onclick="showLoginTab('login')">로그인</button>
      <button class="login-tab" onclick="showLoginTab('register')">계정 만들기</button>
    </div>
    <div id="login-err" class="login-err hidden"></div>
    <div id="tab-login">
      <input id="login-id" placeholder="아이디" autocomplete="username"/>
      <input id="login-pw" type="password" placeholder="비밀번호" autocomplete="current-password"/>
      <button class="btn-login" onclick="doLogin()">로그인</button>

<script>
const MASTER_ID='master';
const DEFAULT_MASTER_PW='master1234'; // 최초 마스터 비번
const CAT_COLORS=['#3B6D11','#185FA5','#993C1D','#534AB7','#854F0B','#A32D2D','#0F6E56'];
const MONTHS_KR=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DOWS=['일','월','화','수','목','금','토'];
const TODAY=new Date();
const TODAY_STR=`${TODAY.getFullYear()}-${p2(TODAY.getMonth()+1)}-${p2(TODAY.getDate())}`;
function p2(n){return String(n).padStart(2,'0')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

let currentUser=null,currentYear=TODAY.getFullYear(),currentMonth=TODAY.getMonth();
let currentView='annual',listFilter='전체',editingEvId=null,editingDocEvId=null,editingDocId=null;
let pwChangeTargetId=null;
let LD={users:[],events:[],categories:{},docs:{},masterPw:DEFAULT_MASTER_PW};
let fbSet,fbGet,fbDB;

async function initFirebase(){
  try{
    const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const {getFirestore,doc,getDoc,setDoc,onSnapshot}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const cfg={
      apiKey:"AIzaSyBaC3DnqbtLg3paTndvFn6APGkeZhybG8A",
      authDomain:"k-planner-ef6e3.firebaseapp.com",
      projectId:"k-planner-ef6e3",
      storageBucket:"k-planner-ef6e3.firebasestorage.app",
      messagingSenderId:"1028952362388",
      appId:"1:1028952362388:web:376340980b3c22f7dd5381"
    };
    const app=initializeApp(cfg);
    fbDB=getFirestore(app);
    const ref=()=>doc(fbDB,'planner','data');
    fbGet=()=>getDoc(ref());
    fbSet=(d)=>setDoc(ref(),d);
    const snap=await fbGet();
    if(snap.exists())LD={...LD,...snap.data()};
    if(!LD.masterPw)LD.masterPw=DEFAULT_MASTER_PW;
    onSnapshot(ref(),(snap)=>{
      if(!snap.exists())return;
      const fresh=snap.data();
      LD={...LD,...fresh};
      if(!LD.masterPw)LD.masterPw=DEFAULT_MASTER_PW;
      if(currentUser==='__master__')renderMasterUsers();
      else if(currentUser)render();
    });
    document.getElementById('loading-screen').style.display='none';
    if(!tryAutoLogin()){
      document.getElementById('login-screen').classList.remove('hidden');
    }
  }catch(e){
    document.getElementById('loading-msg').textContent='연결 오류: '+e.message;
    console.error(e);
  }
}

async function saveData(){
  try{
    await fbSet(LD);
    const b=document.getElementById('sync-badge');
    if(b){b.classList.remove('hidden');clearTimeout(window._st);window._st=setTimeout(()=>b.classList.add('hidden'),2000);}
  }catch(e){alert('저장 오류: '+e.message);}
}

// AUTH
function showLoginTab(tab){
  document.getElementById('tab-login').classList.toggle('hidden',tab!=='login');
  document.getElementById('tab-register').classList.toggle('hidden',tab!=='register');
  document.querySelectorAll('.login-tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('login-err').classList.add('hidden');
}
function showErr(msg){const e=document.getElementById('login-err');e.textContent=msg;e.classList.remove('hidden');}

function doLogin(){
  const id=document.getElementById('login-id').value.trim();
  const pw=document.getElementById('login-pw').value;
  // 마스터 로그인
  if(id===MASTER_ID){
    if(pw!==(LD.masterPw||DEFAULT_MASTER_PW)){showErr('마스터 비밀번호가 올바르지 않습니다.');return;}
    currentUser='__master__';
    localStorage.setItem('planner_auto',JSON.stringify({id,pw}));
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('master-screen').style.display='flex';
    renderMasterUsers();
    return;
  }
  // 일반 로그인
  const u=(LD.users||[]).find(u=>u.id===id&&u.pw===pw);
  if(!u){showErr('아이디 또는 비밀번호가 올바르지 않습니다.');return;}
  localStorage.setItem('planner_auto',JSON.stringify({id,pw}));
  currentUser=u;enterApp();
}

function tryAutoLogin(){
  try{
    const saved=JSON.parse(localStorage.getItem('planner_auto')||'null');
    if(!saved||!saved.id)return false;
    if(saved.id===MASTER_ID){
      if(saved.pw!==(LD.masterPw||DEFAULT_MASTER_PW))return false;
      currentUser='__master__';
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('master-screen').style.display='flex';
      renderMasterUsers();
      return true;
    }
    const u=(LD.users||[]).find(u=>u.id===saved.id&&u.pw===saved.pw);
    if(!u)return false;
    currentUser=u;enterApp();
    return true;
  }catch(e){return false;}
}

async function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const id=document.getElementById('reg-id').value.trim();
  const pw=document.getElementById('reg-pw').value;
  const pw2=document.getElementById('reg-pw2').value;
  if(!name||!id||!pw){showErr('모든 항목을 입력해주세요.');return;}
  if(pw!==pw2){showErr('비밀번호가 일치하지 않습니다.');return;}
  if(id===MASTER_ID){showErr('사용할 수 없는 아이디입니다.');return;}
  if((LD.users||[]).find(u=>u.id===id)){showErr('이미 사용 중인 아이디입니다.');return;}
  if(!LD.users)LD.users=[];
  const u={id,name,pw};
  LD.users.push(u);
  if(!LD.categories)LD.categories={};
  LD.categories[id]=['예배/집회','행사','회의','교육','봉사','기타'];
  await saveData();currentUser=u;enterApp();
}

function enterApp(){
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('master-screen').style.display='none';
  const app=document.getElementById('app');app.style.display='flex';
  document.getElementById('top-name').textContent=currentUser.name;
  document.getElementById('top-avatar').textContent=currentUser.name[0];
  if(!LD.categories)LD.categories={};
  if(!LD.categories[currentUser.id])LD.categories[currentUser.id]=['예배/집회','행사','회의','교육','봉사','기타'];
  document.getElementById('year-disp').textContent=currentYear;
  render();
  initNotifications();
}

function doLogout(){
  currentUser=null;
  localStorage.removeItem('planner_auto');
  document.getElementById('app').style.display='none';
  document.getElementById('master-screen').style.display='none';
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-id').value='';
  document.getElementById('login-pw').value='';
  document.getElementById('login-err').classList.add('hidden');
  const nb=document.getElementById('notif-banner');if(nb)nb.classList.add('hidden');
}

// MASTER
function renderMasterUsers(){
  const list=document.getElementById('user-mgmt-list');list.innerHTML='';
  if(!(LD.users&&LD.users.length)){list.innerHTML='<p style="font-size:13px;color:#aaa;padding:8px">등록된 사용자가 없습니다</p>';return;}
  LD.users.forEach(u=>{
    const row=document.createElement('div');row.className='user-mgmt-row';
    row.innerHTML=`
      <div class="u-avatar">${u.name[0]}</div>
      <div class="u-info">
        <div class="u-name">${u.name}</div>
        <div class="u-id">@${u.id}</div>
      </div>
      <div class="u-actions">
        <button class="u-btn" onclick="showPwChange('${u.id}','${u.name}')">비번 초기화</button>
        <button class="u-btn del" onclick="masterDeleteUser('${u.id}')">삭제</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function showPwChange(uid,uname){
  pwChangeTargetId=uid;
  document.getElementById('pw-change-title').textContent=`🔑 ${uname} 비밀번호 초기화`;
  document.getElementById('new-pw-in').value='';
  document.getElementById('new-pw-in2').value='';
  document.getElementById('pw-change-panel').classList.remove('hidden');
  document.getElementById('new-pw-in').focus();
}
function cancelPwChange(){pwChangeTargetId=null;document.getElementById('pw-change-panel').classList.add('hidden');}
async function applyPwChange(){
  const pw=document.getElementById('new-pw-in').value;
  const pw2=document.getElementById('new-pw-in2').value;
  if(!pw){alert('새 비밀번호를 입력해주세요.');return;}
  if(pw!==pw2){alert('비밀번호가 일치하지 않습니다.');return;}
  const u=(LD.users||[]).find(u=>u.id===pwChangeTargetId);
  if(!u){alert('사용자를 찾을 수 없습니다.');return;}
  u.pw=pw;
  await saveData();
  cancelPwChange();
  renderMasterUsers();
  alert('비밀번호가 변경되었습니다.');
}

async function changeMasterPw(){
  const pw=document.getElementById('master-pw-new').value;
  const pw2=document.getElementById('master-pw-new2').value;
  if(!pw){alert('새 비밀번호를 입력해주세요.');return;}
  if(pw!==pw2){alert('비밀번호가 일치하지 않습니다.');return;}
  LD.masterPw=pw;
  await saveData();
  document.getElementById('master-pw-new').value='';
  document.getElementById('master-pw-new2').value='';
  alert('마스터 비밀번호가 변경되었습니다.');
}

async function masterAddUser(){
  const name=document.getElementById('add-name').value.trim();
  const id=document.getElementById('add-id').value.trim();
  const pw=document.getElementById('add-pw').value;
  if(!name||!id||!pw){alert('모든 항목을 입력해주세요.');return;}
  if(id===MASTER_ID){alert('사용할 수 없는 아이디입니다.');return;}
  if((LD.users||[]).find(u=>u.id===id)){alert('이미 존재하는 아이디입니다.');return;}
  if(!LD.users)LD.users=[];
  LD.users.push({id,name,pw});
  if(!LD.categories)LD.categories={};
  LD.categories[id]=['예배/집회','행사','회의','교육','봉사','기타'];
  await saveData();
  document.getElementById('add-name').value='';
  document.getElementById('add-id').value='';
  document.getElementById('add-pw').value='';
  renderMasterUsers();
  alert(`${name} 계정이 추가되었습니다.`);
}

async function masterDeleteUser(uid){
  const u=(LD.users||[]).find(u=>u.id===uid);
  if(!u||!confirm(`${u.name} 계정을 삭제할까요?\n해당 사용자의 일정도 모두 삭제됩니다.`))return;
  LD.users=LD.users.filter(u=>u.id!==uid);
  LD.events=(LD.events||[]).filter(e=>e.uid!==uid);
  if(LD.categories)delete LD.categories[uid];
  if(LD.docs)delete LD.docs[uid];
  await saveData();renderMasterUsers();
}

// HELPERS
function myEvents(){return(LD.events||[]).filter(e=>e.uid===currentUser.id);}
function eventsForDate(ds){return myEvents().filter(ev=>ev.end&&ev.end>ev.start?ds>=ev.start&&ds<=ev.end:ev.start===ds);}
function changeYear(d){currentYear+=d;document.getElementById('year-disp').textContent=currentYear;render();}
function changeMonth(d){currentMonth+=d;if(currentMonth<0){currentMonth=11;currentYear--;}if(currentMonth>11){currentMonth=0;currentYear++;}document.getElementById('year-disp').textContent=currentYear;render();}
function switchView(v,btn){currentView=v;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');['annual','monthly','list'].forEach(n=>document.getElementById('view-'+n).classList.toggle('hidden',n!==v));render();}
function render(){if(currentView==='annual')renderAnnual();else if(currentView==='monthly')renderMonthly();else renderList();if(currentUser&&currentUser!=='__master__')renderNotifBanner();}

// ANNUAL
function renderAnnual(){
  const g=document.getElementById('annual-grid');g.innerHTML='';
  for(let m=0;m<12;m++){
    const card=document.createElement('div');card.className='month-card';
    const mt=document.createElement('div');mt.className='month-title';mt.textContent=`${currentYear}년 ${MONTHS_KR[m]}`;card.appendChild(mt);
    const cg=document.createElement('div');cg.className='cal-grid';
    DOWS.forEach(d=>{const dw=document.createElement('div');dw.className='cal-dow';dw.textContent=d;cg.appendChild(dw);});
    const fd=new Date(currentYear,m,1).getDay(),dim=new Date(currentYear,m+1,0).getDate();
    for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cal-day';cg.appendChild(e);}
    for(let d=1;d<=dim;d++){
      const ds=`${currentYear}-${p2(m+1)}-${p2(d)}`,evs=eventsForDate(ds),dow=new Date(currentYear,m,d).getDay();
      const el=document.createElement('div');el.className='cal-day';
      if(dow===0)el.classList.add('sun');if(dow===6)el.classList.add('sat');
      if(ds===TODAY_STR)el.classList.add('today');
      if(evs.length){el.classList.add('has-ev');if(evs.length>1)el.classList.add('multi-ev');}
      el.textContent=d;
      if(evs.length){const dot=document.createElement('div');dot.className='ev-dot';el.appendChild(dot);el.title=evs.map(e=>e.title).join(', ');el.onclick=()=>openModal(evs[0].id);}
      else el.onclick=()=>openNewEventDate(ds);
      cg.appendChild(el);
    }
    card.appendChild(cg);g.appendChild(card);
  }
}

// MONTHLY
function renderMonthly(){
  document.getElementById('month-disp').textContent=`${currentYear}년 ${MONTHS_KR[currentMonth]}`;
  const c=document.getElementById('monthly-cal');c.innerHTML='';
  DOWS.forEach(d=>{const dw=document.createElement('div');dw.className='m-dow';dw.textContent=d;c.appendChild(dw);});
  const fd=new Date(currentYear,currentMonth,1).getDay(),dim=new Date(currentYear,currentMonth+1,0).getDate(),prevDim=new Date(currentYear,currentMonth,0).getDate();
  const total=Math.ceil((fd+dim)/7)*7;
  for(let i=0;i<total;i++){
    const cell=document.createElement('div');cell.className='m-day';
    let d,ds,other=false;
    if(i<fd){d=prevDim-fd+i+1;const pm=currentMonth===0?11:currentMonth-1,py=currentMonth===0?currentYear-1:currentYear;ds=`${py}-${p2(pm+1)}-${p2(d)}`;other=true;}
    else if(i>=fd+dim){d=i-fd-dim+1;const nm=currentMonth===11?0:currentMonth+1,ny=currentMonth===11?currentYear+1:currentYear;ds=`${ny}-${p2(nm+1)}-${p2(d)}`;other=true;}
    else{d=i-fd+1;ds=`${currentYear}-${p2(currentMonth+1)}-${p2(d)}`;}
    if(other)cell.classList.add('other-month');
    const dow=i%7;if(dow===0)cell.classList.add('sun');if(dow===6)cell.classList.add('sat');
    if(ds===TODAY_STR)cell.classList.add('today');
    const num=document.createElement('div');num.className='m-day-num';num.textContent=d;cell.appendChild(num);
    eventsForDate(ds).forEach(ev=>{
      const chip=document.createElement('div');chip.className='m-ev-chip';
      if(ev.end&&ev.end>ev.start)chip.classList.add('multi-day');
      chip.textContent=ev.title||'(제목없음)';chip.onclick=(e)=>{e.stopPropagation();openModal(ev.id);};cell.appendChild(chip);
    });
    cell.onclick=()=>{if(!other)openNewEventDate(ds);};c.appendChild(cell);
  }
}

// LIST
function renderList(){
  const cats=['전체',...(LD.categories[currentUser.id]||[]),'처리완료'];
  const fc=document.getElementById('list-filters');fc.innerHTML='';
  cats.forEach(cat=>{const chip=document.createElement('button');chip.className='filter-chip'+(cat===listFilter?' active':'');chip.textContent=cat;chip.onclick=()=>{listFilter=cat;renderList();};fc.appendChild(chip);});
  const evs=myEvents().filter(ev=>{
    if(!ev.start||!ev.start.startsWith(String(currentYear)))return false;
    if(listFilter==='전체')return true;if(listFilter==='처리완료')return ev.done;return ev.cat===listFilter;
  }).sort((a,b)=>a.start.localeCompare(b.start));
  const cont=document.getElementById('list-items');cont.innerHTML='';
  if(!evs.length){cont.innerHTML='<div class="empty-state">📭<br><br>일정이 없습니다<br><span style="font-size:12px">+ 버튼으로 추가해보세요</span></div>';return;}
  evs.forEach(ev=>{
    const item=document.createElement('div');item.className='list-item'+(ev.done?' done-item':'');
    const dp=ev.start.split('-'),dl=`${parseInt(dp[1])}월 ${parseInt(dp[2])}일`;
    const rl=ev.end&&ev.end>ev.start?`~ ${ev.end.split('-').slice(1).map(Number).join('.')}일`:'';
    item.innerHTML=`<div style="flex-shrink:0"><div class="li-date">${dl}</div>${rl?`<div class="li-range">${rl}</div>`:''}</div>${ev.cat?`<div class="li-cat">${ev.cat}</div>`:''}<div class="li-title">${ev.title||'(제목없음)'}</div>${ev.place?`<div class="li-place">📍 ${ev.place}</div>`:''}<div class="li-check ${ev.done?'done':''}" onclick="quickDone('${ev.id}',event)">${ev.done?'✓':''}</div>`;
    item.onclick=(e)=>{if(e.target.classList.contains('li-check'))return;openModal(ev.id);};cont.appendChild(item);
  });
}
async function quickDone(id,e){e.stopPropagation();const ev=(LD.events||[]).find(v=>v.id===id);if(!ev)return;ev.done=!ev.done;await saveData();render();}

// EVENT MODAL

function openModal(id){
  const ev=(LD.events||[]).find(e=>e.id===id);if(!ev)return;
  editingEvId=id;
  document.getElementById('ev-modal-title').textContent='일정 수정';
  document.getElementById('ev-title').value=ev.title||'';document.getElementById('ev-start').value=ev.start||'';
  document.getElementById('ev-end').value=ev.end||'';document.getElementById('ev-place').value=ev.place||'';
  document.getElementById('ev-del-btn').classList.remove('hidden');
  const btn=document.getElementById('ev-status-btn');btn.className='status-pill '+(ev.done?'done':'pending');btn.textContent=ev.done?'✅ 처리완료':'⏳ 미처리';

function fillCatSelect(val){
  const sel=document.getElementById('ev-cat');sel.innerHTML='';
  (LD.categories[currentUser.id]||[]).forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;if(c===val)o.selected=true;sel.appendChild(o);});
}
function toggleEvStatus(){const btn=document.getElementById('ev-status-btn');const isDone=btn.classList.contains('done');btn.className='status-pill '+(isDone?'pending':'done');btn.textContent=isDone?'⏳ 미처리':'✅ 처리완료';}

// TIMELINE
function renderTlList(items){const l=document.getElementById('tl-list');l.innerHTML='';items.forEach(it=>l.appendChild(makeTlRow(it)));}
function makeTlRow(it){const row=document.createElement('div');row.className='tl-row';row.innerHTML=`<input class="tl-time-in" value="${it.time||''}" placeholder="09:00"><span class="tl-sep">|</span><input class="tl-text-in" value="${it.text||''}" placeholder="내용 입력"><div class="tl-chk ${it.done?'done':''}" onclick="tlChk(this)">${it.done?'✓':''}</div><button class="tl-del" onclick="this.closest('.tl-row').remove()">×</button>`;return row;}
function addTlRow(){const l=document.getElementById('tl-list');l.appendChild(makeTlRow({}));l.lastChild.querySelector('.tl-time-in').focus();}
function tlChk(el){el.classList.toggle('done');el.textContent=el.classList.contains('done')?'✓':'';}
function getTlData(){return[...document.querySelectorAll('#tl-list .tl-row')].map(r=>({time:r.querySelector('.tl-time-in').value,text:r.querySelector('.tl-text-in').value,done:r.querySelector('.tl-chk').classList.contains('done')}));}

// CHECKLIST
function renderClList(items){const l=document.getElementById('cl-list');l.innerHTML='';items.forEach(it=>l.appendChild(makeClRow(it)));}
function makeClRow(it){const row=document.createElement('div');row.className='cl-row';row.innerHTML=`<div class="cl-chk ${it.done?'done':''}" onclick="clChk(this)">${it.done?'✓':''}</div><input class="cl-text" value="${it.text||''}" placeholder="체크 항목"><button class="cl-del" onclick="this.closest('.cl-row').remove()">×</button>`;return row;}
function addClRow(){const l=document.getElementById('cl-list');l.appendChild(makeClRow({}));l.lastChild.querySelector('.cl-text').focus();}
function clChk(el){el.classList.toggle('done');el.textContent=el.classList.contains('done')?'✓':'';}
function getClData(){return[...document.querySelectorAll('#cl-list .cl-row')].map(r=>({text:r.querySelector('.cl-text').value,done:r.querySelector('.cl-chk').classList.contains('done')}));}

// DOC BUTTONS
function renderDocBtns(docIds){
  const c=document.getElementById('doc-list-btns');c.innerHTML='';
  (docIds||[]).forEach(docId=>{
    const doc2=((LD.docs&&LD.docs[currentUser.id])||[]).find(d=>d.id===docId);if(!doc2)return;
    const btn=document.createElement('button');btn.className='btn btn-doc';btn.textContent='📄 '+(doc2.title||'문서');btn.onclick=()=>openDoc(editingEvId,docId);c.appendChild(btn);
  });

async function addDoc(){
  if(!editingEvId){if(!confirm('문서를 추가하려면 먼저 일정을 저장해야 합니다. 저장할까요?'))return;await saveEvent();return;}
  openDoc(editingEvId,null);
}

// SAVE/DELETE EVENT
async function saveEvent(){
  const title=document.getElementById('ev-title').value.trim(),start=document.getElementById('ev-start').value;
  if(!title){alert('제목을 입력해주세요.');return;}if(!start){alert('시작일을 입력해주세요.');return;}
  if(!LD.events)LD.events=[];
  const existDocs=editingEvId?((LD.events||[]).find(e=>e.id===editingEvId)?.docs||[]):[];
  const ev={id:editingEvId||uid(),uid:currentUser.id,title,start,end:document.getElementById('ev-end').value||'',cat:document.getElementById('ev-cat').value,place:document.getElementById('ev-place').value,done:document.getElementById('ev-status-btn').classList.contains('done'),timeline:getTlData(),checklist:getClData(),docs:existDocs};
  if(editingEvId){const idx=LD.events.findIndex(e=>e.id===editingEvId);if(idx>=0)LD.events[idx]=ev;}else{LD.events.push(ev);editingEvId=ev.id;}
  await saveData();closeOverlay('ev-overlay');render();
}
async function deleteEvent(){
  if(!editingEvId||!confirm('이 일정을 삭제할까요?'))return;
  LD.events=(LD.events||[]).filter(e=>e.id!==editingEvId);await saveData();closeOverlay('ev-overlay');render();
}

// DOC MODAL
function openDoc(evId,docId){
  editingDocEvId=evId;editingDocId=docId;
  const d=docId?((LD.docs&&LD.docs[currentUser.id])||[]).find(d=>d.id===docId):null;
  document.getElementById('doc-modal-title').textContent=d?'문서 편집':'새 문서';
  document.getElementById('doc-title-in').value=d?.title||'';document.getElementById('doc-date-in').value=d?.date||TODAY_STR;document.getElementById('doc-body-in').value=d?.body||'';

  (d?.checklist||[]).forEach(it=>{const row=document.createElement('div');row.className='cl-row';row.innerHTML=`<div class="cl-chk ${it.done?'done':''}" onclick="clChk(this)">${it.done?'✓':''}</div><input class="cl-text" value="${it.text||''}" placeholder="체크 항목"><button class="cl-del" onclick="this.closest('.cl-row').remove()">×</button>`;dcl.appendChild(row);});

function addDocCl(){const l=document.getElementById('doc-cl-list');const row=document.createElement('div');row.className='cl-row';row.innerHTML=`<div class="cl-chk" onclick="clChk(this)"></div><input class="cl-text" placeholder="체크 항목"><button class="cl-del" onclick="this.closest('.cl-row').remove()">×</button>`;l.appendChild(row);row.querySelector('.cl-text').focus();}
async function saveDoc(){
  const title=document.getElementById('doc-title-in').value.trim()||'문서',body=document.getElementById('doc-body-in').value,date=document.getElementById('doc-date-in').value;
  const checklist=[...document.querySelectorAll('#doc-cl-list .cl-row')].map(r=>({text:r.querySelector('.cl-text').value,done:r.querySelector('.cl-chk').classList.contains('done')}));
  if(!LD.docs)LD.docs={};if(!LD.docs[currentUser.id])LD.docs[currentUser.id]=[];
  const newDoc={id:editingDocId||uid(),title,body,date,checklist};
  if(editingDocId){const idx=LD.docs[currentUser.id].findIndex(d=>d.id===editingDocId);if(idx>=0)LD.docs[currentUser.id][idx]=newDoc;}
  else{LD.docs[currentUser.id].push(newDoc);const ev=(LD.events||[]).find(e=>e.id===editingDocEvId);if(ev){if(!ev.docs)ev.docs=[];ev.docs.push(newDoc.id);}}
  await saveData();closeOverlay('doc-overlay');if(editingDocEvId)renderDocBtns((LD.events||[]).find(e=>e.id===editingDocEvId)?.docs||[]);
}
async function deleteDoc(){
  if(!editingDocId||!confirm('이 문서를 삭제할까요?'))return;
  LD.docs[currentUser.id]=(LD.docs[currentUser.id]||[]).filter(d=>d.id!==editingDocId);
  const ev=(LD.events||[]).find(e=>e.id===editingDocEvId);if(ev)ev.docs=(ev.docs||[]).filter(id=>id!==editingDocId);
  await saveData();closeOverlay('doc-overlay');if(editingDocEvId)renderDocBtns(ev?.docs||[]);
}

// UTILS
function closeOverlay(id){document.getElementById(id).classList.add('hidden');}
function overlayClick(e,id){if(e.target===document.getElementById(id))closeOverlay(id);}

// NOTIFICATIONS
// 알림 규칙: 일정 시작일 전날 18:00 ~ 종료일(또는 시작일) 23:59:59 동안 알림 표시
function dateToTime(ds,h,m,s){const[y,mo,d]=ds.split('-').map(Number);return new Date(y,mo-1,d,h,m,s).getTime();}
function addDaysStr(ds,delta){const[y,mo,d]=ds.split('-').map(Number);const dt=new Date(y,mo-1,d);dt.setDate(dt.getDate()+delta);return `${dt.getFullYear()}-${p2(dt.getMonth()+1)}-${p2(dt.getDate())}`;}

function getActiveNotifications(){
  if(!currentUser||currentUser==='__master__')return[];
  const now=Date.now();
  const result=[];
  myEvents().forEach(ev=>{
    if(ev.done)return;
    const endDate=ev.end&&ev.end>ev.start?ev.end:ev.start;
    const windowStart=dateToTime(ev.start,18,0,0)-86400000; // 전날 18:00
    const windowEnd=dateToTime(endDate,23,59,59);
    if(now>=windowStart&&now<=windowEnd){
      const todayStr=TODAY_STR;
      let tag='today';
      if(todayStr<ev.start)tag='tomorrow';
      result.push({ev,tag});
    }
  });
  result.sort((a,b)=>a.ev.start.localeCompare(b.ev.start));
  return result;
}

function renderNotifBanner(){
  const items=getActiveNotifications();
  const banner=document.getElementById('notif-banner');
  const dot=document.getElementById('notif-dot');
  if(!items.length){
    banner.classList.add('hidden');banner.innerHTML='';
    dot.classList.add('hidden');
    return;
  }
  dot.classList.remove('hidden');
  let html=`<div class="notif-banner-title">🔔 알림 (${items.length})</div>`;
  items.forEach(({ev,tag})=>{
    const dp=ev.start.split('-');
    const label=tag==='tomorrow'?`내일 ${parseInt(dp[1])}/${parseInt(dp[2])}`:'오늘';
    html+=`<div class="notif-item" onclick="openModal('${ev.id}')"><span class="notif-tag ${tag}">${label}</span><span>${ev.title||'(제목없음)'}</span></div>`;
  });
  banner.innerHTML=html;
}

function toggleNotifBanner(){
  const banner=document.getElementById('notif-banner');
  if(getActiveNotifications().length===0){
    banner.classList.add('hidden');
    return;
  }
  banner.classList.toggle('hidden');
}

function initNotifications(){
  renderNotifBanner();
  // 브라우저 알림 권한 요청 & 발송 (중복 방지: 날짜+이벤트ID 기준)
  if('Notification' in window){
    if(Notification.permission==='default'){
      Notification.requestPermission();
    }
    sendBrowserNotifications();
  }
  // 1시간마다 갱신
  clearInterval(window._notifTimer);
  window._notifTimer=setInterval(()=>{renderNotifBanner();sendBrowserNotifications();},60*60*1000);
}

function sendBrowserNotifications(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const items=getActiveNotifications();
  let sentLog={};
  try{sentLog=JSON.parse(localStorage.getItem('planner_notif_sent')||'{}');}catch(e){}
  const todayKey=TODAY_STR;
  items.forEach(({ev,tag})=>{
    const key=`${todayKey}_${ev.id}`;
    if(sentLog[key])return;
    const dp=ev.start.split('-');
    const body=tag==='tomorrow'?`내일(${parseInt(dp[1])}/${parseInt(dp[2])}) 일정: ${ev.title}`:`오늘 일정: ${ev.title}`;
    try{new Notification('📅 연간 플래너',{body,tag:key});}catch(e){}
    sentLog[key]=true;
  });
  localStorage.setItem('planner_notif_sent',JSON.stringify(sentLog));
}
